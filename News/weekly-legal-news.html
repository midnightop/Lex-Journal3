<!DOCTYPE html>
<html lang="en" class="overflow-y-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekly Legal Digest | Law Journal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Glossy Shadow Effect */
        .glossy-card {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        /* Icon Glow on Hover */
        .news-item:hover .icon-box {
            box-shadow: 0 0 15px currentColor;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 font-sans antialiased text-gray-800">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-gray-200/50 px-6 py-4">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-black tracking-tighter text-blue-700 uppercase drop-shadow-sm">
                LawJournal<span class="text-gray-800">.online</span>
            </a>
            <a href="javascript:history.back()" class="text-xs font-bold text-gray-500 hover:text-blue-600 transition-colors flex items-center bg-gray-100 px-3 py-1.5 rounded-full border border-gray-200/50 hover:border-blue-200 hover:bg-blue-50">
                <i class="fa-solid fa-arrow-left-long mr-2"></i> Back
            </a>
        </div>
    </nav>

    <main class="max-w-lg mx-auto px-4 py-10">
        
        <div class="mb-8 text-center">
            <span class="inline-block bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-3">Digest Feed</span>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight leading-tight">Weekly Wrap-Up</h1>
            <p class="text-xs text-gray-500 mt-1.5 font-medium max-w-sm mx-auto">One neat place for this week's essential legal updates.</p>
        </div>

        <div class="glossy-card bg-white rounded-3xl border border-gray-100/70 overflow-hidden relative">
            
            <div class="absolute inset-0 bg-white/40 backdrop-blur-3xl -z-10"></div>

            <div class="bg-gray-50/70 backdrop-blur-sm px-6 py-4 border-b border-gray-100/70 flex items-center justify-between">
                <div class="flex items-center gap-3 text-[11px] font-semibold text-gray-600">
                    <span class="flex items-center"><i class="fa-regular fa-calendar mr-1.5 text-blue-600"></i> May 4, 2026</span>
                </div>
                <span class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-sm shadow-blue-200">
                    5 Min Read
                </span>
            </div>

            <div class="p-5 md:p-7">
                
                <div class="space-y-2.5">
                    
                    <div class="news-item flex items-center gap-4 p-3 rounded-2xl hover:bg-white/50 transition-all border border-transparent hover:border-gray-100 cursor-pointer text-blue-600">
                        <div class="icon-box w-10 h-10 shrink-0 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 shadow-inner border border-blue-100/50 transition-shadow">
                            <i class="fa-solid fa-scale-balanced text-sm"></i>
                        </div>
                        <h3 class="text-sm font-bold text-gray-800 leading-snug hover:text-blue-700">
                            SC Clarifies BNS Transition & Bail Provisions
                        </h3>
                    </div>

                    <div class="news-item flex items-center gap-4 p-3 rounded-2xl hover:bg-white/50 transition-all border border-transparent hover:border-gray-100 cursor-pointer text-cyan-600">
                        <div class="icon-box w-10 h-10 shrink-0 rounded-full bg-cyan-50 flex items-center justify-center text-cyan-600 shadow-inner border border-cyan-100/50 transition-shadow">
                            <i class="fa-solid fa-file-shield text-sm"></i>
                        </div>
                        <h3 class="text-sm font-bold text-gray-800 leading-snug hover:text-cyan-700">
                            MV Act: New Guidelines for Sec 184 & 194 Challans
                        </h3>
                    </div>

                    <div class="news-item flex items-center gap-4 p-3 rounded-2xl hover:bg-white/50 transition-all border border-transparent hover:border-gray-100 cursor-pointer text-purple-600">
                        <div class="icon-box w-10 h-10 shrink-0 rounded-full bg-purple-50 flex items-center justify-center text-purple-600 shadow-inner border border-purple-100/50 transition-shadow">
                            <i class="fa-solid fa-book-bookmark text-sm"></i>
                        </div>
                        <h3 class="text-sm font-bold text-gray-800 leading-snug hover:text-purple-700">
                            Application of 'Mens Rea' in Recent Cybercrimes
                        </h3>
                    </div>

                </div>
            </div>

            <div class="p-5 md:p-7 bg-white border-t border-gray-100/70 relative">
                <a href="weekly-digest-full.html" class="block w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white text-center py-3.5 rounded-xl font-bold uppercase text-[11px] tracking-widest shadow-md shadow-blue-200/50 hover:from-blue-700 hover:to-blue-800 transition-all active:scale-[0.98]">
                    Read Full Digest
                </a>
            </div>

        </div>

    </main>

</body>
</html>
