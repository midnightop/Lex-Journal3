<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Maxims Library | CLJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .maxim-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .maxim-card:hover { transform: translateY(-5px); }
        
        .search-glow:focus {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
        }

        /* Glass effect for header */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 glass-header px-6 py-4 flex justify-between items-center border-b border-gray-100">
        <button onclick="window.history.back()" class="text-gray-600 hover:text-amber-600 transition">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </button>
        <h1 class="font-black text-gray-900 text-lg tracking-tighter uppercase">CLJ <span class="text-amber-600">Maxims</span></h1>
        <div class="w-10"></div> </nav>

    <header class="pt-12 pb-10 px-6 text-center">
        <h2 class="text-4xl font-serif font-bold text-gray-900 leading-tight">Latin <span class="text-amber-600 italic">Terminology</span></h2>
        <p class="mt-3 text-gray-500 text-[10px] font-black uppercase tracking-[0.3em]">Fundamental Judicial Principles</p>
        
        <div class="mt-8 max-w-md mx-auto relative">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Search 100+ Maxims (e.g. Audi...)" 
                   class="w-full py-4 pl-14 pr-6 bg-white border border-gray-100 rounded-2xl shadow-sm outline-none search-glow transition-all font-medium">
        </div>
    </header>

    <main class="px-6 max-w-4xl mx-auto space-y-4" id="maximContainer">
        </main>

    <div id="detailsModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-md flex items-end md:items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-t-[2.5rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl relative animate-in fade-in zoom-in duration-300">
            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-3 py-1 rounded-full uppercase tracking-widest">Maxim Details</span>
                        <h3 id="modalTitle" class="text-2xl font-black text-gray-900 mt-4 leading-tight italic"></h3>
                    </div>
                    <button onclick="closeModal()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-500">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="space-y-6 overflow-y-auto max-h-[60vh] pr-2 no-scrollbar">
                    <section>
                        <h4 class="text-xs font-black uppercase text-gray-400 tracking-widest mb-2">Meaning</h4>
                        <p id="modalMeaning" class="text-gray-700 leading-relaxed font-medium"></p>
                    </section>

                    <section>
                        <h4 class="text-xs font-black uppercase text-gray-400 tracking-widest mb-2">Origin & Background</h4>
                        <p id="modalOrigin" class="text-gray-600 text-sm leading-relaxed"></p>
                    </section>

                    <section>
                        <h4 class="text-xs font-black uppercase text-gray-400 tracking-widest mb-2">Landmark Case / Usage</h4>
                        <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-xl">
                            <p id="modalCase" class="text-amber-900 text-sm font-bold italic"></p>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-xs font-black uppercase text-gray-400 tracking-widest mb-2">Importance</h4>
                        <p id="modalImportance" class="text-gray-600 text-sm"></p>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample Data - I've added key ones, you can expand this to 100+ easily
        const maxims = [
            {
                title: "Audi Alteram Partem",
                meaning: "Hear the other side / No man should be condemned unheard.",
                origin: "Derived from Natural Justice. Rooted in ancient Roman law principles ensuring fairness in adjudication.",
                case: "Maneka Gandhi v. Union of India (1978)",
                importance: "Cornerstone of Administrative Law. Prevents arbitrary decisions by authorities."
            },
            {
                title: "Actus Non Facit Reum Nisi Mens Sit Rea",
                meaning: "The act does not make a person guilty unless the mind is also guilty.",
                origin: "Fundamental principle of Criminal Jurisprudence. Distinguishes between accidental and intentional acts.",
                case: "State of Maharashtra v. Mayer Hans George (1965)",
                importance: "Used to determine 'Mens Rea' (Guilty Mind) in criminal trials."
            },
            {
                title: "Ubi Jus Ibi Remedium",
                meaning: "Where there is a right, there is a remedy.",
                origin: "Established in English Common Law. If a person's legal right is violated, the court must provide a solution.",
                case: "Ashby v. White (1703)",
                importance: "Basis for Writ Jurisprudence and Torts. Ensures that rights are not just on paper."
            },
            {
                title: "Res Ipsa Loquitur",
                meaning: "The thing speaks for itself.",
                origin: "Law of Torts. Used in negligence cases where the accident's nature makes the defendant's liability obvious.",
                case: "Municipal Corporation of Delhi v. Subhagwanti (1966)",
                importance: "Shifts the burden of proof to the defendant to prove they were not negligent."
            },
            {
                title: "Ignorantia Facti Excusat, Ignorantia Juris Non Excusat",
                meaning: "Ignorance of fact is an excuse, ignorance of law is not.",
                origin: "Roman legal doctrine. It is presumed every citizen knows the law of the land.",
                case: "Mayer Hans George Case (Presumption of knowledge of law)",
                importance: "Ensures people cannot escape punishment simply by saying 'I didn't know the law'."
            },
            {
                title: "Caveat Emptor",
                meaning: "Let the buyer beware.",
                origin: "Commercial and Contract Law. The buyer is responsible for checking the quality of goods before purchase.",
                case: "Ward v. Hobbs (1878)",
                importance: "Key in Consumer Protection history, though now balanced by 'Caveat Venditor' (Seller beware)."
            }
            // Add 94 more here following the same structure...
        ];

        function renderMaxims(data) {
            const container = document.getElementById('maximContainer');
            container.innerHTML = data.map((m, index) => `
                <div onclick="showDetails(${index})" class="maxim-card bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center cursor-pointer">
                    <div>
                        <h3 class="font-black text-gray-900 italic text-lg">${m.title}</h3>
                        <p class="text-gray-500 text-sm mt-1 line-clamp-1">${m.meaning}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm ml-4"></i>
                </div>
            `).join('');
        }

        function showDetails(index) {
            const m = maxims[index];
            document.getElementById('modalTitle').innerText = m.title;
            document.getElementById('modalMeaning').innerText = m.meaning;
            document.getElementById('modalOrigin').innerText = m.origin;
            document.getElementById('modalCase').innerText = m.case;
            document.getElementById('modalImportance').innerText = m.importance;
            
            document.getElementById('detailsModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = maxims.filter(m => 
                m.title.toLowerCase().includes(term) || 
                m.meaning.toLowerCase().includes(term)
            );
            renderMaxims(filtered);
        });

        // Initial Render
        renderMaxims(maxims);
    </script>
</body>
</html>
