<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Maxims Library | LJ Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfdfe; 
            color: #1e293b;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }

        /* Premium Smooth Card Animation */
        .maxim-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform, opacity;
        }
        .maxim-card:hover {
            transform: translate3d(0, -8px, 0);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-color: #fbbf24;
        }

        /* GPU Accelerated Modal Animation */
        #detailsModal {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-out;
            will-change: opacity;
        }

        #detailsModal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            transform: translate3d(0, 100%, 0);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }

        #detailsModal.active .modal-content {
            transform: translate3d(0, 0, 0);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Audio Pulse Effect */
        .playing { animation: pulse 1s infinite; color: #fbbf24 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="pb-20" oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-gray-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-amber-200">
                <i class="fa-solid fa-book-bookmark"></i>
            </div>
            <div>
                <h1 class="font-black text-gray-900 text-lg tracking-tighter uppercase leading-none">LJ <span class="text-amber-600">Lexicon</span></h1>
                <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mt-1 block">Audio Enabled Library</span>
            </div>
        </div>
        <button onclick="window.history.back()" class="flex items-center gap-2 bg-gray-900 text-white px-5 py-2.5 rounded-full active:scale-90 transition shadow-lg">
            <span class="text-[10px] font-bold uppercase tracking-widest">back</span>
            <i class="fa-solid fa-house-chimney text-xs"></i>
        </button>
    </nav>

    <header class="pt-16 pb-12 px-8 text-center bg-gradient-to-b from-amber-50/50 to-transparent">
        <h2 class="text-6xl font-serif font-black text-gray-950 leading-tight">Legal <br><span class="text-amber-600 italic uppercase text-4xl tracking-tighter not-italic">Maxims</span></h2>
        <p class="mt-4 text-gray-400 text-[10px] font-black uppercase tracking-[0.4em]">The Language of Justice</p>
        
        <div class="mt-10 max-w-lg mx-auto">
            <input type="text" id="searchInput" placeholder="Search Maxims" 
                   class="w-full py-5 px-8 bg-white border border-gray-100 rounded-[2rem] outline-none text-gray-700 font-medium transition-all text-sm shadow-sm focus:border-amber-400">
        </div>
    </header>

    <main class="px-6 max-w-2xl mx-auto space-y-5 mt-8" id="maximContainer">
        </main>

    <div id="detailsModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-md items-end md:items-center justify-center p-4">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div class="modal-content bg-white w-full max-w-2xl rounded-t-[3rem] md:rounded-[3rem] overflow-hidden shadow-2xl relative">
            
            <div class="p-8 md:p-12 overflow-y-auto max-h-[85vh] no-scrollbar">
                <div class="flex justify-between items-start mb-8">
                    <div class="flex-1">
                        <div class="flex items-center gap-3">
                            <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Maxim Breakdown</span>
                        </div>
                        <h3 id="modalTitle" class="text-4xl font-serif font-black text-gray-900 mt-4 leading-tight italic"></h3>
                    </div>
                    <button id="audioBtn" onclick="speakMaxim()" class="w-14 h-14 bg-amber-500 text-white rounded-2xl flex items-center justify-center shadow-xl shadow-amber-200 active:scale-90 transition">
                        <i class="fa-solid fa-volume-high text-xl"></i>
                    </button>
                </div>

                <div class="space-y-10">
                    <section>
                        <h4 class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-4">Core Meaning</h4>
                        <p id="modalMeaning" class="text-gray-900 text-2xl font-bold leading-snug"></p>
                    </section>

                    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                            <h4 class="text-[9px] font-black uppercase text-amber-600 tracking-widest mb-3">Origin & History</h4>
                            <p id="modalOrigin" class="text-gray-600 text-xs leading-relaxed text-justify"></p>
                        </div>
                        <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                            <h4 class="text-[9px] font-black uppercase text-amber-600 tracking-widest mb-3">Judicial Use</h4>
                            <p id="modalUsage" class="text-gray-600 text-xs leading-relaxed text-justify"></p>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-4">Key Takeaway</h4>
                        <div class="p-6 bg-amber-50 rounded-[2rem] border border-amber-100">
                            <p id="modalCase" class="text-amber-900 font-black text-lg italic mb-2"></p>
                            <p id="modalDetails" class="text-amber-800/70 text-sm leading-relaxed text-justify"></p>
                        </div>
                    </section>
                </div>

                <button onclick="closeModal()" class="mt-10 w-full py-5 bg-gray-900 text-white rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] active:scale-95 transition">Close Lexicon</button>
            </div>
        </div>
    </div>

    <script>
        const maxims = [
            { title: "Justice delayed is justice denied", meaning: "If legal redress is available for a party that has suffered some injury, but is not forthcoming in a timely fashion, it is effectively the same as having no redress at all.", origin: "Common Law Principle", usage: "Constitutional Law", case: "Hussainara Khatoon v. Home Secretary, State of Bihar", details: "Emphasizes the right to a speedy trial as a fundamental right." },
            { title: "Actus non facit reum nisi mens sit rea", meaning: "An act does not make a person guilty unless the mind is also guilty.", origin: "Criminal Jurisprudence", usage: "Determining Criminal Liability", case: "R v. Tolson", details: "Establishment of intent is crucial for a criminal conviction." },
            { title: "Audi alteram partem", meaning: "Hear the other side.", origin: "Natural Justice", usage: "Administrative Law", case: "Maneka Gandhi v. Union of India", details: "No person should be judged without a fair opportunity to be heard." },
            { title: "Nemo judex in causa sua", meaning: "No one should be a judge in their own cause.", origin: "Natural Justice", usage: "Judicial Proceedings", case: "A.K. Kraipak v. Union of India", details: "Prevents bias in decision-making processes." },
            { title: "Ignorantia juris non excusat", meaning: "Ignorance of the law excuses no one.", origin: "Roman Law", usage: "General Law", case: "M.H. George v. State of Maharashtra", details: "Presumption that every person knows the law of the land." },
            { title: "Ubi jus ibi remedium", meaning: "Where there is a right, there is a remedy.", origin: "Common Law", usage: "Tort Law", case: "Ashby v. White", details: "If a person's legal right is violated, the law provides a means of seeking compensation." },
            { title: "Injuria sine damno", meaning: "Injury without damage.", origin: "Law of Torts", usage: "Actionable Per Se", case: "Bhim Singh v. State of J&K", details: "Violation of a legal right without actual physical or financial loss is still actionable." },
            { title: "Damnum sine injuria", meaning: "Damage without injury.", origin: "Law of Torts", usage: "Non-actionable claims", case: "Gloucester Grammar School case", details: "Actual loss or damage without violation of a legal right gives no ground for legal action." },
            { title: "Actus reus", meaning: "The physical act of committing a crime.", origin: "Criminal Law", usage: "Criminal Liability", case: "General Criminal Law", details: "The objective element of a crime." },
            { title: "Mens rea", meaning: "The mental intent to commit a crime.", origin: "Criminal Law", usage: "Criminal Liability", case: "General Criminal Law", details: "The subjective or 'guilty mind' element of a crime." },
            { title: "In dubio pro reo", meaning: "In doubt, for the accused.", origin: "Roman Law", usage: "Criminal Trials", case: "Burden of Proof", details: "A defendant may not be convicted by the court when doubts about their guilt remain." },
            { title: "Nullum crimen sine lege", meaning: "No crime without a law.", origin: "Legal Legality", usage: "Criminal Justice", case: "Article 20 of Indian Constitution", details: "A person cannot be punished for something that was not a crime when committed." },
            { title: "Nulla poena sine lege", meaning: "No penalty without a law.", origin: "Rule of Law", usage: "Penal Systems", case: "Principle of Legality", details: "Punishment can only be imposed if it was previously prescribed by law." },
            { title: "He who seeks equity must do equity", meaning: "A person seeking an equitable remedy must be prepared to act fairly.", origin: "Equity Jurisprudence", usage: "Civil Law", case: "Equitable Relief", details: "The court will only assist those who are willing to fulfill their own obligations." },
            { title: "He who comes into equity must come with clean hands", meaning: "A plaintiff must not be guilty of misconduct in the matter brought before the court.", origin: "Equity Jurisprudence", usage: "Injunctions/Specific Performance", case: "General Equity Principles", details: "Relief is denied to those who have acted unethically in the transaction." },
            { title: "Equity looks to intent rather than form", meaning: "Equity focuses on the substance of an agreement rather than technicalities.", origin: "Chancery Law", usage: "Contract Interpretation", case: "Interpretation of Deeds", details: "The true intention of parties prevails over clerical errors or formal defects." },
            { title: "Equity will not suffer a wrong without a remedy", meaning: "Equity will provide a solution where the common law fails.", origin: "Maxims of Equity", usage: "Judicial Discretion", case: "Trust Law", details: "Ensures justice is not denied due to technical gaps in existing law." },
            { title: "Res ipsa loquitur", meaning: "The thing speaks for itself.", origin: "Law of Torts", usage: "Negligence Cases", case: "Municipal Corp of Delhi v. Subhagwanti", details: "The accident itself implies negligence due to the nature of the event." },
            { title: "Volenti non fit injuria", meaning: "To a willing person, injury is not done.", origin: "Common Law", usage: "Defense in Torts", case: "Hall v. Brooklands Auto Racing Club", details: "Consent to a risk bars a claim for damages resulting from that risk." },
            { title: "Salus populi suprema lex esto", meaning: "The health/welfare of the people shall be the supreme law.", origin: "Political Philosophy", usage: "Public Policy", case: "Emergency Powers", details: "The individual interest must yield to the public good." },
            { title: "Fiat justitia ruat caelum", meaning: "Let justice be done though the heavens fall.", origin: "Roman Maxim", usage: "Judicial Integrity", case: "Somerset's Case", details: "Justice must be realized regardless of the consequences." },
            { title: "Lex loci delicti", meaning: "The law of the place where the crime/tort was committed.", origin: "Conflict of Laws", usage: "International Law", case: "Jurisdiction Determination", details: "Governs which jurisdiction's laws apply in cross-border disputes." },
            { title: "Ex turpi causa non oritur actio", meaning: "From a dishonorable cause, an action does not arise.", origin: "Contract Law", usage: "Illegal Contracts", case: "Holman v. Johnson", details: "A court will not assist a person who bases their cause of action on an illegal act." },
            { title: "Ei incumbit probatio qui dicit, non qui negat", meaning: "The burden of proof lies upon him who affirms, not on him who denies.", origin: "Evidence Law", usage: "Trial Procedure", case: "Indian Evidence Act", details: "The party making a claim must prove it." },
            { title: "Falsus in uno, falsus in omnibus", meaning: "False in one thing, false in everything.", origin: "Witness Testimony", usage: "Trial Evaluation", case: "State of UP v. Sahai", details: "Used to assess the credibility of witnesses (applied cautiously in India)." },
            { title: "Res judicata", meaning: "A matter judged.", origin: "Civil Procedure", usage: "Prevention of Litigation", case: "Section 11 CPC", details: "A case cannot be re-litigated between the same parties once decided." },
            { title: "Sub judice", meaning: "Under a judge.", origin: "Procedural Law", usage: "Ongoing Cases", case: "Contempt of Court", details: "A matter that is currently under trial and cannot be discussed publicly to avoid bias." },
            { title: "Delegatus non potest delegare", meaning: "A delegate cannot delegate.", origin: "Administrative Law", usage: "Power Delegation", case: "A.K. Roy v. State of Punjab", details: "A person to whom power is delegated cannot further delegate it to others." },
            { title: "Actio personalis moritur cum persona", meaning: "A personal right of action dies with the person.", origin: "Common Law", usage: "Defamation/Personal Injury", case: "Survival of Actions", details: "Personal legal actions cannot be continued by heirs (with exceptions)." },
            { title: "Nemo dat quod non habet", meaning: "No one gives what they do not have.", origin: "Property Law", usage: "Sale of Goods", case: "Title Disputes", details: "A seller cannot pass a better title than they themselves possess." },
            { title: "Expressio unius est exclusio alterius", meaning: "The express mention of one thing excludes others.", origin: "Statutory Interpretation", usage: "Legal Drafting", case: "Interpretation of Statutes", details: "Explicitly listing items implies the exclusion of those not listed." },
            { title: "Generalia specialibus non derogant", meaning: "General things do not derogate from special things.", origin: "Legal Logic", usage: "Conflict of Laws", case: "Statutory Interpretation", details: "Special laws prevail over general laws in specific matters." },
            { title: "Ut res magis valeat quam pereat", meaning: "It is better for a thing to have effect than to be made void.", origin: "Interpretation", usage: "Constitutional/Contract Law", case: "Preservation of Validity", details: "Courts prefer interpretations that make a statute or contract valid." },
            { title: "Reddendo singula singulis", meaning: "By rendering each his own.", origin: "Statutory Interpretation", usage: "Distributive Interpretation", case: "Grammatical Construction", details: "Words are referred to their appropriate subjects respectively." },
            { title: "Casus omissus pro omisso habendus est", meaning: "A case omitted is to be held as intentionally omitted.", origin: "Interpretation", usage: "Legislative Intent", case: "Judicial Restraint", details: "Courts should not supply gaps in legislation." },
            { title: "Ejusdem generis", meaning: "Of the same kind.", origin: "Interpretation", usage: "Classifying Words", case: "Statutory Analysis", details: "General words following specific words are limited to the same category." },
            { title: "Noscitur a sociis", meaning: "It is known by its associates.", origin: "Linguistics", usage: "Contextual Meaning", case: "Interpretation of Statutes", details: "The meaning of an unclear word is determined by the words surrounding it." },
            { title: "Lex non cogit ad impossibilia", meaning: "The law does not compel a man to do that which he cannot possibly perform.", origin: "Common Law", usage: "Excusing Performance", case: "Contractual Impossibility", details: "Legal obligations are discharged if performance is physically impossible." },
            { title: "Lex fori", meaning: "The law of the forum.", origin: "Private International Law", usage: "Procedural Law", case: "Jurisdiction", details: "The law of the court in which the action is brought governs the procedure." },
            { title: "Lex posterior derogat priori", meaning: "A later law repeals an earlier one.", origin: "Legislative Authority", usage: "Conflict of Statutes", case: "Implied Repeal", details: "Newer legislation takes precedence over older conflicting laws." },
            { title: "Lex specialis derogat legi generali", meaning: "Special law repeals general law.", origin: "Interpretation", usage: "Statutory Priority", case: "Conflict of Laws", details: "A specific law overrides a general law when they conflict." },
            { title: "Pacta sunt servanda", meaning: "Agreements must be kept.", origin: "International Law", usage: "Treaty/Contract Law", case: "Vienna Convention", details: "Fundamental principle that signed agreements are binding." },
            { title: "Qui facit per alium facit per se", meaning: "He who acts through another acts himself.", origin: "Law of Agency", usage: "Vicarious Liability", case: "Master-Servant Relationship", details: "An employer is responsible for the acts of their agent or employee." },
            { title: "Acta exteriora indicant interiora secreta", meaning: "Outward acts indicate inward secrets.", origin: "Evidence", usage: "Inferring Intent", case: "Criminal Intent", details: "A person's intention is inferred from their visible actions." },
            { title: "Vigilantibus non dormientibus jura subveniunt", meaning: "The law assists those who are vigilant, not those who sleep over their rights.", origin: "Limitation Law", usage: "Laches/Delay", case: "Statute of Limitations", details: "Legal rights must be enforced within a reasonable or prescribed time." },
            { title: "Nemo debet bis vexari pro una et eadem causa", meaning: "No man should be punished twice for the same cause.", origin: "Criminal Procedure", usage: "Double Jeopardy", case: "Article 20(2) Constitution", details: "Prevents multiple trials/punishments for the same offense." },
            { title: "Interest reipublicae ut sit finis litium", meaning: "It is in the interest of the state that there be an end to litigation.", origin: "Public Policy", usage: "Finality of Judgments", case: "Res Judicata principle", details: "Legal disputes must eventually reach a final and binding conclusion." },
            { title: "Ab initio", meaning: "From the beginning.", origin: "General Legal term", usage: "Void Contracts", case: "Mohori Bibee v. Dharmodas Ghose", details: "Used to describe something that was invalid or effective from the very start." },
            { title: "Bona fide", meaning: "In good faith.", origin: "Civil Law", usage: "Trust/Contracts", case: "Good Faith Purchase", details: "Actions done honestly without intention to deceive." },
            { title: "Mala fide", meaning: "In bad faith.", origin: "Civil/Administrative Law", usage: "Abuse of Power", case: "Quashing of Orders", details: "Actions carried out with intent to deceive or with malicious intent." }
        ];

        function renderMaxims(data) {
            const container = document.getElementById('maximContainer');
            container.innerHTML = data.map((m, index) => `
                <div class="maxim-card p-8 rounded-[2.5rem] flex justify-between items-center cursor-pointer shadow-sm" onclick="showDetails(${index})">
                    <div class="flex-1">
                        <h3 class="font-black text-gray-900 italic text-xl tracking-tight">${m.title}</h3>
                        <p class="text-gray-400 text-[10px] font-bold mt-2 uppercase tracking-widest line-clamp-1">${m.meaning}</p>
                    </div>
                    <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </div>
                </div>
            `).join('');
        }

        function showDetails(index) {
            const m = maxims[index];
            document.getElementById('modalTitle').innerText = m.title;
            document.getElementById('modalMeaning').innerText = m.meaning;
            document.getElementById('modalOrigin').innerText = m.origin;
            document.getElementById('modalUsage').innerText = m.usage;
            document.getElementById('modalCase').innerText = m.case;
            document.getElementById('modalDetails').innerText = m.details;
            
            const modal = document.getElementById('detailsModal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('active'); }, 10);
            document.body.style.overflow = 'hidden';

            window.history.pushState({ modalOpen: true }, "");
        }

        function closeModal() {
            const modal = document.getElementById('detailsModal');
            modal.classList.remove('active');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                document.body.style.overflow = 'auto';
            }, 400);

            if (window.history.state && window.history.state.modalOpen) {
                window.history.back();
            }
        }

        window.onpopstate = function(event) {
            const modal = document.getElementById('detailsModal');
            if (!modal.classList.contains('hidden')) {
                modal.classList.remove('active');
                setTimeout(() => { 
                    modal.classList.add('hidden'); 
                    document.body.style.overflow = 'auto';
                }, 400);
            }
        };

        function speakMaxim() {
            const text = document.getElementById('modalTitle').innerText;
            const btn = document.getElementById('audioBtn').querySelector('i');
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'la';
            msg.rate = 0.7;
            
            btn.classList.add('playing');
            window.speechSynthesis.speak(msg);
            msg.onend = () => { btn.classList.remove('playing'); };
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = maxims.filter(m => 
                m.title.toLowerCase().includes(term) || 
                m.meaning.toLowerCase().includes(term)
            );
            renderMaxims(filtered);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'i')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });

        renderMaxims(maxims);
    </script>
</body>
</html>
