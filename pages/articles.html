<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Research Hub | Law Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800;900&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; /* Dark background to make glass pop */
            background-image: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: #f8fafc; 
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Smooth Floating Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glossy-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .author-img-container {
            position: relative;
            width: 48px;
            height: 48px;
        }

        .author-img {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            object-cover: cover;
            border: 1.5px solid rgba(255,255,255,0.2);
        }

        /* Fixed Blue Tick: Clean & Natural */
        .verified-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            font-size: 11px;
            color: #3b82f6;
            background: #0f172a; /* Matches body bg */
            border-radius: 50%;
            padding: 1px;
            display: flex;
        }

        .read-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .read-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.97);
        }

        .accent-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass-nav px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="w-10 h-10 bg-white/5 flex items-center justify-center rounded-xl border border-white/10 active:scale-90 transition-all">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="font-black text-lg tracking-tighter">LAW <span class="text-blue-500">JOURNAL</span></h1>
        </div>
    </nav>

    <main class="px-6 py-8 pb-32">
        <h2 class="text-3xl font-serif font-bold mb-8">Research <span class="text-blue-500 italic">Hub</span></h2>

        <div id="articles-hub" class="space-y-5">
            </div>
    </main>

    <script>
        // Fixing the "Back Button to Top" issue
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'auto';
        }

        const articleDatabase = [
            { id: "01", author: "Ettisa Basak", univ: "Sureswar Dutta Law | CU", title: "Advantages of Bare Acts", link: "read/article1.html", photo: "read/author1.jpg", accent: "#3b82f6" },
            { id: "02", author: "Rey", univ: "Surendranath Law | CU", title: "Why Law is Important", link: "read/article2.html", photo: "read/author2.jpg", accent: "#818cf8" },
            { id: "03", author: "Bishal Soren", univ: "Surendranath Law | CU", title: "The Constitution", link: "read/article3.html", photo: "read/author3.jpg", accent: "#60a5fa" },
            { id: "04", author: "Analdeep Samanta", univ: "South Calcutta Law | CU", title: "What is Case Law?", link: "read/article4.html", photo: "read/author4.jpg", accent: "#10b981" }
        ];

        const container = document.getElementById('articles-hub');

        const render = () => {
            container.innerHTML = articleDatabase.map((art, i) => `
                <div class="glossy-card" style="animation-delay: ${i * 0.1}s">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="author-img-container">
                                <img src="${art.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${art.author.replace(' ', '+')}&background=334155&color=fff'" class="author-img">
                                <span class="verified-badge"><i class="fa-solid fa-circle-check"></i></span>
                            </div>
                            <div>
                                <h4 class="font-bold text-xs">${art.author}</h4>
                                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-tight">${art.univ}</p>
                            </div>
                        </div>
                        <div class="accent-dot" style="color: ${art.accent}; background: ${art.accent}"></div>
                    </div>

                    <h3 class="text-sm font-black uppercase tracking-tight mb-4 text-slate-100">${art.title}</h3>

                    <a href="${art.link}" class="read-btn">
                        Open File <i class="fa-solid fa-chevron-right text-[8px] opacity-50"></i>
                    </a>
                </div>
            `).join('');
        };

        render();

        // Anti-glitch: Smooth transition when navigating
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                document.body.style.opacity = '0.5';
                document.body.style.transition = 'opacity 0.2s';
            });
        });
    </script>
</body>
</html>
