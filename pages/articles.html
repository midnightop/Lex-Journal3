<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Hub | Law Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; }

        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .font-serif { font-family: 'Playfair Display', serif; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .premium-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        .read-btn {
            background: #2563eb;
            color: white;
            padding: 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 glass-nav px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="w-10 h-10 bg-white border border-slate-100 flex items-center justify-center rounded-2xl shadow-sm text-slate-800">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <h1 class="font-black text-slate-900 text-lg tracking-tighter">LEX <span class="text-blue-600">HUB</span></h1>
        </div>
    </nav>

    <main class="px-6 py-8">
        <header class="mb-10">
            <h2 class="text-3xl font-serif font-bold text-slate-900">Featured <span class="text-blue-600">Articles</span></h2>
        </header>

        <div id="articles-hub" class="space-y-8"></div>
    </main>

    <script>
        // YAHAN DATA UPDATE KIYA HAI: Ettisa Basak ka article connect karne ke liye
        const articleDatabase = [
            {
                id: "01",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law College | University of Calcutta",
                title: "The Advantages of Using Bare Acts",
                desc: "Understanding the accuracy, precision, and importance of Bare Acts for legal professionals and students.",
                link: "read/article1.html", // Yeh aapki banayi hui file se connect hoga
                accent: "#2563eb"
            }
        ];

        const container = document.getElementById('articles-hub');
        container.innerHTML = articleDatabase.map(art => `
            <div class="premium-card p-6" style="border-left: 5px solid ${art.accent}">
                <div class="flex items-center gap-4 mb-6">
                    <img src="read/author1.jpg" onerror="this.src='https://ui-avatars.com/api/?name=${art.author.replace(' ', '+')}&background=2563eb&color=fff'" 
                         class="w-14 h-14 rounded-[20px] shadow-sm border-2 border-white object-cover">
                    <div>
                        <div class="flex items-center gap-1">
                            <h4 class="font-black text-slate-800 text-sm">${art.author}</h4>
                            <i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i>
                        </div>
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-tight">${art.university}</p>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-2xl p-4 mb-6 border border-slate-100">
                    <h3 class="text-md font-black text-slate-900 leading-tight mb-2 uppercase tracking-tighter">${art.title}</h3>
                    <p class="text-[11px] text-slate-500 line-clamp-2 italic">"${art.desc}"</p>
                </div>

                <a href="${art.link}" class="read-btn">Read Full Research <i class="fa-solid fa-arrow-right-long ml-2"></i></a>
            </div>
        `).join('');

        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73 || e.keyCode === 83)) return false;
        };
    </script>
</body>
</html>
