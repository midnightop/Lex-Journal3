<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Law Journal | Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; color: #0f172a; }

        /* Card Stylings */
        .premium-card {
            background: white; border-radius: 35px; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0; transform: translateY(20px); border: 1px solid #f1f5f9; position: relative;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05);
        }
        .premium-card.show { opacity: 1; transform: translateY(0); }
        .premium-card:active { transform: scale(0.97); }

        /* Article Count Badge */
        .count-badge {
            background: rgba(37, 99, 235, 0.08);
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid rgba(37, 99, 235, 0.1);
            letter-spacing: 0.5px;
        }

        /* Action Button */
        .action-btn {
            background: #0f172a;
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3);
        }
        .premium-card:active .action-btn { background: #2563eb; transform: translateY(-2px); }

        /* Modal Styles */
        #article-modal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px); z-index: 1000; padding: 15px; align-items: flex-end; justify-content: center;
        }
        #article-modal.active { display: flex; }
        body.modal-open { overflow: hidden; }

        .modal-container {
            background: #ffffff; width: 100%; max-width: 500px; max-height: 88vh; border-radius: 40px 40px 0 0;
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.3, 1.2, 0.5, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .exit-btn {
            background: #f1f5f9; width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #64748b;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-5 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-10 h-10 bg-slate-50 flex items-center justify-center rounded-2xl border border-slate-200">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="font-extrabold text-slate-900 text-lg tracking-tight">RESEARCH HUB</h1>
                <p class="text-[9px] font-black text-blue-600 tracking-widest uppercase">Calcutta Law Journal</p>
            </div>
        </div>
        <button onclick="toggleSearch()" class="w-11 h-11 rounded-full bg-slate-50 flex items-center justify-center text-slate-600 border border-slate-200">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </nav>

    <main class="px-6 py-8 pb-24">
        <header class="mb-10">
            <h2 style="font-family: 'Playfair Display';" class="text-4xl text-slate-900 leading-tight">Legal <br><span class="italic text-blue-600">Thought Leaders</span></h2>
            <div class="flex items-center gap-2 mt-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">4 Scholars Verified</p>
            </div>
        </header>

        <div id="articles-hub" class="space-y-8"></div>
    </main>

    <div id="article-modal">
        <div class="modal-container">
            <div class="flex justify-between items-center p-6 border-b border-slate-50">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Scholar Profile</span>
                <button onclick="closeModal()" class="exit-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body overflow-y-auto p-6" id="modal-content-area">
                <div id="modal-profile-header"></div>
                <div class="mt-8">
                    <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-scroll text-blue-600"></i> Journal Archive
                    </h3>
                    <div id="modal-articles-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const authorData = [
            {
                id: "auth1",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law College",
                insta: "@ettisa_basak",
                photo: "read/author1.jpg",
                accent: "#3b82f6",
                bio: "Law student at Sureswar Dutta Law College under the University of Calcutta. Specialized in Bare Acts research and legislative interpretation.",
                articles: [
                    { title: "The Power of Bare Acts", desc: "Understanding why original legislative texts are indispensable for legal professionals.", link: "read/article1.html", date: "17 Apr 2026", time: "11 min", status: "published" },
                    { title: "Judicial Activism", desc: "A look into the evolution of court powers in India.", link: "#", date: "May 2026", time: "15 min", status: "locked" }
                ]
            },
            {
                id: "auth2",
                author: "Rey",
                university: "Surendranath Law College",
                insta: "@rey_legal",
                photo: "read/author2.jpg",
                accent: "#8b5cf6",
                bio: "Legal scholar at Surendranath Law College, University of Calcutta. Exploring the philosophy behind Indian Jurisprudence.",
                articles: [
                    { title: "Foundations of Jurisprudence", desc: "A deep dive into why law exists and how it maintains the social fabric of India.", link: "read/article2.html", date: "18 Apr 2026", time: "10 min", status: "published" }
                ]
            },
            {
                id: "auth3",
                author: "Analdeep Samanta",
                university: "South Calcutta Law College",
                insta: "@analdeep_s",
                photo: "read/author4.jpg",
                accent: "#10b981",
                bio: "Student at South Calcutta Law College, University of Calcutta. Researcher of Case Laws and judicial precedents.",
                articles: [
                    { title: "What Is Case Law", desc: "Learning about Indian legal cases and conducting in depth research on them.", link: "read/article4.html", date: "20 Apr 2026", time: "15 min", status: "published" }
                ]
            },
            {
                id: "auth4",
                author: "Bishal Soren",
                university: "Surendranath Law College",
                insta: "@bishal_soren",
                photo: "read/author3.jpg",
                accent: "#f59e0b",
                bio: "Scholar at Surendranath Law College under the University of Calcutta. Analyzing Constitutional frameworks and the Rule of Law.",
                articles: [
                    { title: "Constitutional Framework", desc: "Analyzing the 'Rule of Law' and the structural backbone of our democratic nation.", link: "read/article3.html", date: "19 Apr 2026", time: "13 min", status: "published" }
                ]
            }
        ];

        const container = document.getElementById('articles-hub');
        const modal = document.getElementById('article-modal');

        const openModal = (id) => {
            const data = authorData.find(a => a.id === id);
            document.body.classList.add('modal-open');
            document.getElementById('modal-profile-header').innerHTML = `
                <div class="flex items-center gap-5">
                    <img src="${data.photo}" class="w-20 h-20 rounded-[28px] object-cover shadow-lg" onerror="this.src='https://ui-avatars.com/api/?name=${data.author.replace(' ', '+')}&background=2563eb&color=fff'">
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 class="text-xl font-extrabold text-slate-900">${data.author}</h2>
                            <i class="fa-solid fa-circle-check text-blue-500"></i>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${data.university}</p>
                        <a href="#" class="inline-flex items-center gap-1.5 mt-3 text-[10px] font-bold text-pink-600 bg-pink-50 px-3 py-1.5 rounded-full">
                            <i class="fa-brands fa-instagram"></i> ${data.insta}
                        </a>
                    </div>
                </div>
                <p class="mt-6 text-sm text-slate-500 font-medium leading-relaxed">${data.bio}</p>
            `;

            let html = "";
            data.articles.forEach(art => {
                if(art.status === 'published') {
                    html += `
                    <div class="p-5 bg-slate-50 rounded-3xl border border-slate-100 mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">${art.date}</span>
                            <span class="text-[9px] font-bold text-slate-400 italic">${art.time} read</span>
                        </div>
                        <h4 class="text-md font-bold text-slate-900 mb-2">${art.title}</h4>
                        <p class="text-xs text-slate-500 mb-4 line-clamp-2">${art.desc}</p>
                        <a href="${art.link}" class="w-full py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-center block uppercase tracking-widest">Explore Paper</a>
                    </div>`;
                } else {
                    html += `
                    <div class="p-5 border border-dashed border-slate-200 rounded-3xl mb-4 opacity-60">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Upcoming Publication</span>
                            <i class="fa-solid fa-lock text-[10px] text-slate-300"></i>
                        </div>
                        <h4 class="text-md font-bold text-slate-300">${art.title}</h4>
                    </div>`;
                }
            });
            document.getElementById('modal-articles-list').innerHTML = html;
            modal.classList.add('active');
        };

        const closeModal = () => {
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
        };

        const render = () => {
            container.innerHTML = "";
            authorData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = `premium-card p-6`;
                card.onclick = () => openModal(data.id);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-3">
                            <img src="${data.photo}" class="w-12 h-12 rounded-2xl object-cover ring-2 ring-slate-50 shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${data.author.replace(' ', '+')}'">
                            <div>
                                <div class="flex items-center gap-1.5">
                                    <h4 class="font-bold text-slate-900 text-sm">${data.author}</h4>
                                    <i class="fa-solid fa-circle-check text-blue-500 text-[11px]"></i>
                                </div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">CU Affiliated Student</p>
                            </div>
                        </div>
                        <div class="count-badge">${data.articles.length < 10 ? '0' + data.articles.length : data.articles.length} ARTICLES</div>
                    </div>
                    
                    <div class="space-y-2 mb-6">
                        <h3 class="text-xl font-extrabold text-slate-900 leading-tight">${data.articles[0].title}</h3>
                        <p class="text-[12px] text-slate-500 font-medium leading-relaxed line-clamp-2">
                            ${data.articles[0].desc}
                        </p>
                    </div>

                    <button class="action-btn w-full uppercase">
                        View Author Portfolio <i class="fa-solid fa-arrow-right"></i>
                    </button>
                `;
                container.appendChild(card);
                setTimeout(() => card.classList.add('show'), index * 120);
            });
        };

        window.onload = render;
        window.onclick = (e) => e.target == modal ? closeModal() : null;
    </script>
</body>
</html>
