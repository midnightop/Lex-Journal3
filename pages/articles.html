<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Law Journal | Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfdfd; 
            color: #0f172a; 
        }

        .premium-card {
            background: white;
            border-radius: 28px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            transform: translateY(25px);
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            cursor: pointer;
        }

        .premium-card.show { opacity: 1; transform: translateY(0); }
        .premium-card:active { transform: scale(0.96); }

        .accent-line {
            position: absolute; left: 0; top: 20px; bottom: 20px; width: 4px; border-radius: 0 4px 4px 0;
        }

        /* Search Overlay Styles */
        #search-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 2000;
            padding: 20px;
            flex-direction: column;
        }

        #search-overlay.active { display: flex; }

        /* Modal Styles */
        #article-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 15px;
            align-items: center;
            justify-content: center;
        }

        #article-modal.active { display: flex; }
        body.modal-open { overflow: hidden; }

        .modal-container {
            background: #f8fafc;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 35px;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalSlide {
            from { transform: translateY(100px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-header { padding: 25px; background: white; border-radius: 35px 35px 0 0; border-bottom: 1px solid #f1f5f9; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .inner-article-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; }

        .exit-btn {
            position: absolute; top: -60px; right: 10px; background: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1e293b;
        }

        .suggestion-item {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.2s;
        }
        .suggestion-item:active { background: #f8fafc; }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-5 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-10 h-10 bg-slate-50 flex items-center justify-center rounded-2xl text-slate-900 border border-slate-200">
                <i class="fa-solid fa-arrow-left-long"></i>
            </a>
            <div>
                <h1 class="font-extrabold text-slate-900 text-lg leading-none">ARTICLES</h1>
                <p class="text-[10px] font-bold text-blue-600 tracking-widest uppercase mt-1">Lawjournal.online</p>
            </div>
        </div>
        <button onclick="toggleSearch()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200 text-slate-600 active:scale-90 transition-transform">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </nav>

    <div id="search-overlay">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="toggleSearch()" class="text-slate-400 text-xl"><i class="fa-solid fa-chevron-left"></i></button>
            <input type="text" id="search-input" placeholder="Search articles or authors..." 
                   class="flex-1 bg-slate-100 border-none rounded-2xl px-5 py-3 font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div id="search-results" class="overflow-y-auto">
            </div>
    </div>

    <main class="px-6 py-8 pb-24 relative">
        <header class="mb-10">
            <h2 style="font-family: 'Playfair Display';" class="text-4xl text-slate-900">Legal <span class="italic text-blue-600">Perspectives</span></h2>
            <p class="text-slate-500 text-sm mt-2 font-medium">Curated articles by law students.</p>
        </header>
        <div id="articles-hub" class="space-y-6"></div>
    </main>

    <div id="article-modal">
        <div class="modal-container">
            <button class="exit-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header" id="modal-header-info"></div>
            <div class="modal-body" id="modal-list"></div>
        </div>
    </div>

    <script>
        const authorData = [
            {
                id: "auth1",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law College",
                photo: "read/author1.jpg",
                accent: "#3b82f6",
                articles: [
                    { title: "The Power of Bare Acts", desc: "Understanding why original legislative texts are indispensable.", link: "read/article1.html", date: "17 Apr 2026", time: "11 min" },
                    { title: "Legal Drafting 101", desc: "Tips for writing concise legal documents.", link: "#", date: "19 Apr 2026", time: "8 min" }
                ]
            },
            {
                id: "auth2",
                author: "Rey",
                university: "Surendranath Law College",
                photo: "read/author2.jpg",
                accent: "#8b5cf6",
                articles: [
                    { title: "Foundations of Jurisprudence", desc: "A deep dive into why law exists and maintains social fabric.", link: "read/article2.html", date: "18 Apr 2026", time: "10 min" }
                ]
            },
            {
                id: "auth3",
                author: "Analdeep Samanta",
                university: "South Calcutta Law College",
                photo: "read/author4.jpg",
                accent: "#10b981",
                articles: [
                    { title: "What Is Case Law", desc: "Learning about Indian legal cases and in-depth research.", link: "read/article4.html", date: "20 Apr 2026", time: "15 min" },
                    { title: "PIL Framework", desc: "How Public Interest Litigation changed India.", link: "#", date: "21 Apr 2026", time: "12 min" }
                ]
            },
            {
                id: "auth4",
                author: "Bishal Soren",
                university: "Surendranath Law College",
                photo: "read/author3.jpg",
                accent: "#f59e0b",
                articles: [
                    { title: "Constitutional Framework", desc: "Analyzing the 'Rule of Law' in our democratic nation.", link: "read/article3.html", date: "19 Apr 2026", time: "13 min" }
                ]
            }
        ];

        const container = document.getElementById('articles-hub');
        const modal = document.getElementById('article-modal');
        const searchOverlay = document.getElementById('search-overlay');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        // Toggle Search Overlay
        function toggleSearch() {
            searchOverlay.classList.toggle('active');
            if(searchOverlay.classList.contains('active')) {
                searchInput.focus();
            } else {
                searchInput.value = "";
                searchResults.innerHTML = "";
            }
        }

        // Search Logic
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            searchResults.innerHTML = "";
            
            if(query.length < 1) return;

            authorData.forEach(auth => {
                auth.articles.forEach(art => {
                    if(art.title.toLowerCase().includes(query) || auth.author.toLowerCase().includes(query)) {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerHTML = `
                            <p class="text-xs font-bold text-blue-600 uppercase tracking-tighter">${auth.author}</p>
                            <h5 class="text-sm font-bold text-slate-800">${art.title}</h5>
                        `;
                        div.onclick = () => {
                            toggleSearch();
                            openModal(auth.id);
                        };
                        searchResults.appendChild(div);
                    }
                });
            });
        });

        // Modal Logic
        const openModal = (authId) => {
            const data = authorData.find(a => a.id === authId);
            document.body.classList.add('modal-open');
            
            document.getElementById('modal-header-info').innerHTML = `
                <div class="flex items-center gap-4">
                    <img src="${data.photo}" class="w-14 h-14 rounded-2xl object-cover ring-4 ring-slate-50" onerror="this.src='https://ui-avatars.com/api/?name=${data.author.replace(' ', '+')}&background=${data.accent.replace('#','')}&color=fff'">
                    <div>
                        <h4 class="font-bold text-slate-900">${data.author}</h4>
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">${data.university}</p>
                    </div>
                </div>
            `;

            let articlesHtml = "";
            data.articles.forEach(art => {
                articlesHtml += `
                    <div class="inner-article-card shadow-sm">
                        <div class="flex justify-between mb-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${art.date}</span>
                            <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">${art.time} read</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-900 leading-tight mb-2">${art.title}</h3>
                        <p class="text-xs text-slate-500 mb-4 font-medium leading-relaxed">${art.desc}</p>
                        <a href="${art.link}" class="inline-flex items-center gap-2 text-[11px] font-extrabold text-blue-600 uppercase tracking-tighter">
                            Read Full Article <i class="fa-solid fa-arrow-right text-[9px]"></i>
                        </a>
                    </div>
                `;
            });
            document.getElementById('modal-list').innerHTML = articlesHtml;
            modal.classList.add('active');
        };

        const closeModal = () => {
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
        };

        const renderAuthors = () => {
            container.innerHTML = "";
            authorData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = `premium-card relative p-6`;
                card.onclick = () => openModal(data.id);
                
                card.innerHTML = `
                    <div class="accent-line" style="background: ${data.accent}"></div>
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <img src="${data.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${data.author.replace(' ', '+')}&background=${data.accent.replace('#','')}&color=fff'" 
                                     class="w-12 h-12 rounded-2xl object-cover shadow-sm">
                            <div>
                                <h4 class="font-bold text-slate-900 text-sm">${data.author}</h4>
                                <p class="text-[10px] text-slate-400 font-semibold uppercase">${data.university}</p>
                            </div>
                        </div>
                        <div class="bg-slate-900 text-white px-3 py-1 rounded-full flex items-center gap-2 shadow-lg">
                             <span class="text-[10px] font-bold">${data.articles.length} Articles</span>
                             <i class="fa-solid fa-chevron-right text-[8px]"></i>
                        </div>
                    </div>
                    <div class="mt-4">
                        <h3 class="text-lg font-extrabold text-slate-900 leading-tight">${data.articles[0].title}</h3>
                        <p class="text-[12px] text-slate-500 mt-1 line-clamp-1">${data.articles[0].desc}</p>
                    </div>
                `;
                container.appendChild(card);
                setTimeout(() => { card.classList.add('show'); }, index * 100);
            });
        };

        window.onload = renderAuthors;
        window.onclick = (e) => { if(e.target == modal) closeModal(); };
    </script>
</body>
</html>
