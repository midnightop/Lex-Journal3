<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Law Journal | Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; color: #0f172a; overflow-x: hidden; }

        .premium-card {
            background: white; border-radius: 35px; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0; transform: translateY(20px); border: 1px solid #f1f5f9; position: relative;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05);
        }
        .premium-card.show { opacity: 1; transform: translateY(0); }
        .premium-card:active { transform: scale(0.97); }

        .count-badge {
            background: rgba(37, 99, 235, 0.08); color: #2563eb;
            padding: 8px 16px; border-radius: 18px; font-size: 11px; font-weight: 800;
            border: 1px solid rgba(37, 99, 235, 0.1); text-align: center; line-height: 1.2;
        }

        .action-btn {
            background: #0f172a; color: white; padding: 18px 20px; border-radius: 24px;
            font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2);
        }

        #search-overlay {
            display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 20px; flex-direction: column;
        }
        #search-overlay.active { display: flex; }

        #article-modal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px); z-index: 1000; padding: 15px; align-items: flex-end; justify-content: center;
        }
        #article-modal.active { display: flex; }
        body.modal-open { overflow: hidden; }

        .modal-container {
            background: #ffffff; width: 100%; max-width: 500px; max-height: 88vh; border-radius: 40px 40px 0 0;
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.3, 1.2, 0.5, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .exit-btn {
            background: #f1f5f9; width: 42px; height: 42px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #64748b;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-5 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-10 h-10 bg-slate-50 flex items-center justify-center rounded-2xl border border-slate-200 text-slate-900">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="font-extrabold text-slate-900 text-lg tracking-tight uppercase">Research Hub</h1>
                <p class="text-[9px] font-black text-blue-600 tracking-widest uppercase">Lawjournal.online</p>
            </div>
        </div>
        <button onclick="toggleSearch(true)" class="w-11 h-11 rounded-full bg-slate-50 flex items-center justify-center text-slate-600 border border-slate-200">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </nav>

    <div id="search-overlay">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="toggleSearch(false)" class="text-slate-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
            <input type="text" id="search-input" placeholder="Search research topics..." class="flex-1 bg-slate-100 border-none rounded-2xl px-5 py-4 font-bold outline-none">
        </div>
        <div id="search-results" class="flex-1 overflow-y-auto"></div>
    </div>

    <main class="px-6 py-8 pb-24">
        <header class="mb-10">
            <h2 style="font-family: 'Playfair Display';" class="text-4xl text-slate-900 leading-tight">Legal <br><span class="italic text-blue-600">Thought Leaders</span></h2>
        </header>
        <div id="articles-hub" class="space-y-8"></div>
    </main>

    <div id="article-modal">
        <div class="modal-container">
            <div class="flex justify-between items-center p-6 border-b border-slate-50">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Author Profile</span>
                <button onclick="closeModal()" class="exit-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body overflow-y-auto p-6">
                <div id="modal-profile-header"></div>
                <div class="mt-8">
                    <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-scroll text-blue-600"></i> Publications
                    </h3>
                    <div id="modal-articles-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const authorData = [
            {
                id: "auth1",
                author: "Ettisa Basak",
                university: "CALCUTTA UNIVERSITY STUDENT",
                insta: "@ettisa_basak",
                photo: "read/author1.jpg",
                bio: "Law student specializing in Bare Acts research and legislative interpretation under the University of Calcutta.",
                articles: [
                    { title: "The Power of Bare Acts", desc: "Understanding why original legislative texts are indispensable for legal professionals.", link: "read/article1.html", date: "17 Apr 2026", time: "11 min", status: "published" },
                    { title: "Judicial Activism", desc: "A look into the evolution of court powers in India.", link: "#", date: "May 2026", time: "15 min", status: "locked" }
                ]
            },
            {
                id: "auth2",
                author: "Rey",
                university: "SURENDRANATH LAW COLLEGE",
                insta: "@rey_legal",
                photo: "read/author2.jpg",
                bio: "Exploring the philosophy behind Indian Jurisprudence and Social Law structures.",
                articles: [
                    { title: "Foundations of Jurisprudence", desc: "A deep dive into why law exists and how it maintains the social fabric of India.", link: "read/article2.html", date: "18 Apr 2026", time: "10 min", status: "published" }
                ]
            },
            {
                id: "auth3",
                author: "Analdeep Samanta",
                university: "SOUTH CALCUTTA LAW COLLEGE",
                insta: "@analdeep_s",
                photo: "read/author4.jpg",
                bio: "Researcher of Indian legal cases and judicial precedents with a focus on procedural law.",
                articles: [
                    { title: "What Is Case Law", desc: "Learning about Indian legal cases and conducting in depth research on them.", link: "read/article4.html", date: "20 Apr 2026", time: "15 min", status: "published" }
                ]
            },
            {
                id: "auth4",
                author: "Bishal Soren",
                university: "SURENDRANATH LAW COLLEGE",
                insta: "@bishal_soren",
                photo: "read/author3.jpg",
                bio: "Analyzing the structural backbone of the Indian Constitution and democratic nation-building.",
                articles: [
                    { title: "Constitutional Framework", desc: "Analyzing the 'Rule of Law' and the structural backbone of our democratic nation.", link: "read/article3.html", date: "19 Apr 2026", time: "13 min", status: "published" }
                ]
            }
        ];

        const container = document.getElementById('articles-hub');
        const modal = document.getElementById('article-modal');

        // HISTORY API LOGIC: Push state when opening modal
        function openModal(id) {
            const data = authorData.find(a => a.id === id);
            
            window.history.pushState({ modalOpen: true }, "");
            
            document.body.classList.add('modal-open');
            document.getElementById('modal-profile-header').innerHTML = `
                <div class="flex items-center gap-5">
                    <img src="${data.photo}" class="w-20 h-20 rounded-[28px] object-cover shadow-lg" onerror="this.src='https://ui-avatars.com/api/?name=${data.author}'">
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 class="text-xl font-extrabold text-slate-900">${data.author}</h2>
                            <i class="fa-solid fa-circle-check text-blue-500"></i>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${data.university}</p>
                        <span class="text-[10px] font-bold text-pink-600 bg-pink-50 px-3 py-1 rounded-full mt-2 inline-block">${data.insta}</span>
                    </div>
                </div>
                <p class="mt-6 text-sm text-slate-500 font-medium leading-relaxed">${data.bio}</p>
            `;

            let html = "";
            data.articles.forEach(art => {
                const isPublished = art.status === 'published';
                html += `
                <div class="p-5 ${isPublished ? 'bg-slate-50' : 'bg-white border-dashed opacity-60'} rounded-3xl border border-slate-100 mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-black text-blue-600 uppercase">${art.date}</span>
                        ${!isPublished ? '<i class="fa-solid fa-lock text-[10px]"></i>' : ''}
                    </div>
                    <h4 class="text-md font-bold text-slate-900 my-1">${art.title}</h4>
                    <p class="text-xs text-slate-500 mb-4 line-clamp-2">${art.desc}</p>
                    ${isPublished ? `<a href="${art.link}" class="w-full py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-center block uppercase tracking-widest active:scale-95 transition-transform">Read Full Article</a>` : '<span class="text-[10px] font-bold text-slate-400 uppercase">Coming Soon</span>'}
                </div>`;
            });
            document.getElementById('modal-articles-list').innerHTML = html;
            modal.classList.add('active');
        }

        function closeModal() {
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                document.body.classList.remove('modal-open');
                if (window.history.state && window.history.state.modalOpen) {
                    window.history.back();
                }
            }
        }

        // Close modal when hardware back button is pressed
        window.onpopstate = function(event) {
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                document.body.classList.remove('modal-open');
            }
        };

        const render = () => {
            container.innerHTML = "";
            authorData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = `premium-card p-6`;
                card.onclick = () => openModal(data.id);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-3">
                            <img src="${data.photo}" class="w-14 h-14 rounded-2xl object-cover shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${data.author}'">
                            <div>
                                <div class="flex items-center gap-1.5">
                                    <h4 class="font-bold text-slate-900 text-[15px]">${data.author}</h4>
                                    <i class="fa-solid fa-circle-check text-blue-500 text-[12px]"></i>
                                </div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${data.university}</p>
                            </div>
                        </div>
                        <div class="count-badge">0${data.articles.length}<br><span class="text-[8px] opacity-60 uppercase">Articles</span></div>
                    </div>
                    <h3 class="text-2xl font-extrabold text-slate-900 leading-tight mb-2">${data.articles[0].title}</h3>
                    <p class="text-[14px] text-slate-500 font-medium leading-relaxed mb-8 line-clamp-2">${data.articles[0].desc}</p>
                    <button class="action-btn w-full uppercase">View Author Portfolio <i class="fa-solid fa-arrow-right"></i></button>
                `;
                container.appendChild(card);
                setTimeout(() => card.classList.add('show'), index * 120);
            });
        };

        function toggleSearch(show) {
            document.getElementById('search-overlay').classList.toggle('active', show);
        }

        window.onload = render;
        window.onclick = (e) => e.target == modal ? closeModal() : null;
    </script>
</body>
</html>
