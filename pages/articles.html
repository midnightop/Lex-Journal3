<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Law Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,800;1,800&display=swap');
        
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: #fdfdfd; 
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #0f172a; 
        }

        /* Sleek Card Design */
        .journal-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.15, 0.83, 0.66, 1);
            opacity: 0;
            transform: translateY(15px);
        }

        .journal-card.show { opacity: 1; transform: translateY(0); }

        .journal-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.15);
        }

        .category-pill {
            background: #f1f5f9;
            color: #64748b;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 100px;
            text-transform: uppercase;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl px-6 py-4 flex items-center justify-between border-b border-slate-100/50">
        <h1 class="font-extrabold text-slate-900 text-lg tracking-tight">LAW <span class="text-blue-600">J.</span></h1>
        <div class="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center text-white text-[10px]">
            <i class="fa-solid fa-bars"></i>
        </div>
    </nav>

    <main class="px-5 py-6">
        <header class="mb-6">
            <p class="text-blue-600 font-bold text-[10px] uppercase tracking-widest mb-1">Featured Insights</p>
            <h2 style="font-family: 'Playfair Display';" class="text-3xl font-extrabold text-slate-900 leading-none italic">The Archive</h2>
        </header>

        <div id="articles-hub" class="flex flex-col gap-4">
            </div>
    </main>

    <script>
        const articleDatabase = [
            {
                id: "01",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law",
                title: "The Power of Bare Acts",
                desc: "Why original legislative texts are essential for legal professionals.",
                link: "read/article1.html",
                accent: "blue-500",
                readTime: "3m read"
            },
            {
                id: "02",
                author: "Rey",
                university: "Surendranath Law",
                title: "Foundations of Law",
                desc: "A deep dive into why law exists and how it maintains social fabric.",
                link: "read/article2.html",
                accent: "indigo-500",
                readTime: "4m read"
            },
            {
                id: "03",
                author: "Bishal Soren",
                university: "Surendranath Law",
                title: "The Constitution",
                desc: "Analyzing the structural backbone of our modern nation-state.",
                link: "read/article3.html",
                accent: "orange-500",
                readTime: "5m read"
             },
            {
                id: "04",
                author: "Analdeep Samanta",
                university: "South Calcutta Law",
                title: "Case Law Research",
                desc: "How to research judgments effectively and build winning arguments.",
                link: "read/article4.html",
                accent: "emerald-500",
                readTime: "4m read"
            }
        ];

        const container = document.getElementById('articles-hub');

        const renderArticles = () => {
            container.innerHTML = "";
            articleDatabase.forEach((art, index) => {
                const card = document.createElement('div');
                card.className = `journal-card p-5 relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center text-slate-400">
                                <i class="fa-solid fa-user-tie text-sm"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-900 text-xs">${art.author}</h4>
                                <p class="text-[9px] text-slate-400 font-medium">${art.university}</p>
                            </div>
                        </div>
                        <span class="category-pill">${art.readTime}</span>
                    </div>

                    <div class="mb-4">
                        <h3 class="text-[17px] font-extrabold text-slate-900 leading-tight mb-2">
                            ${art.title}
                        </h3>
                        <p class="text-[11px] text-slate-500 leading-relaxed line-clamp-2">
                            ${art.desc}
                        </p>
                    </div>

                    <div class="flex items-center gap-2">
                        <a href="${art.link}" class="btn-gradient flex-1 py-3 rounded-2xl text-[10px] font-bold text-white text-center uppercase tracking-widest flex items-center justify-center gap-2">
                            Explore <i class="fa-solid fa-arrow-right text-[8px]"></i>
                        </a>
                        <button class="w-11 h-11 rounded-2xl border border-slate-200 flex items-center justify-center text-slate-400">
                            <i class="fa-regular fa-bookmark text-sm"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
                
                setTimeout(() => { card.classList.add('show'); }, index * 100);
            });
        };

        window.onload = renderArticles;
    </script>
</body>
</html>
