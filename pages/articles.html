<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Law Journal | Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfdfd; 
            color: #0f172a; 
        }

        .premium-card {
            background: white;
            border-radius: 28px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            transform: translateY(25px);
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            overflow: hidden;
            cursor: pointer;
        }

        .premium-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .premium-card:active {
            transform: scale(0.96);
        }

        .accent-line {
            position: absolute;
            left: 0;
            top: 20px;
            bottom: 20px;
            width: 4px;
            border-radius: 0 4px 4px 0;
        }

        /* Modal Styles */
        #article-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        #article-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 32px;
            padding: 30px;
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #article-modal.active .modal-content {
            transform: scale(1);
        }

        .meta-text {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-5 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-10 h-10 bg-slate-50 flex items-center justify-center rounded-2xl text-slate-900 border border-slate-200">
                <i class="fa-solid fa-arrow-left-long"></i>
            </a>
            <div>
                <h1 class="font-extrabold text-slate-900 text-lg leading-none">ARTICLES</h1>
                <p class="text-[10px] font-bold text-blue-600 tracking-widest uppercase mt-1">Lawjournal.online</p>
            </div>
        </div>
        <button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200 active:scale-90 transition-transform">
            <i class="fa-solid fa-magnifying-glass text-slate-600 text-sm"></i>
        </button>
    </nav>

    <main class="px-6 py-8 pb-24 relative overflow-hidden">
        <header class="mb-10">
            <h2 style="font-family: 'Playfair Display';" class="text-4xl text-slate-900">Legal <span class="italic text-blue-600">Perspectives</span></h2>
            <p class="text-slate-500 text-sm mt-2 font-medium">Curated articles by law students.</p>
        </header>

        <div id="articles-hub" class="space-y-6">
            </div>
    </main>

    <div id="article-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body">
                </div>
            <button onclick="closeModal()" class="mt-6 w-full py-3 text-slate-400 font-bold text-xs uppercase tracking-widest">Close Preview</button>
        </div>
    </div>

    <script>
        const articleDatabase = [
            {
                id: "01",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law College",
                title: "The Power of Bare Acts",
                desc: "Understanding why original legislative texts are indispensable for every legal professional.",
                link: "read/article1.html",
                photo: "read/author1.jpg", 
                accent: "#3b82f6",
                readTime: "11 min",
                date: "17 Apr 2026"
            },
            {
                id: "02",
                author: "Rey",
                university: "Surendranath Law College",
                title: "Foundations of Jurisprudence",
                desc: "A deep dive into why law exists and how it maintains the social fabric of India.",
                link: "read/article2.html",
                photo: "read/author2.jpg", 
                accent: "#8b5cf6",
                readTime: "10 min",
                date: "18 apr 2026"
            },
            {
                id: "03",
                author: "Analdeep Samanta",
                university: "South Calcutta Law College",
                title: "What Is Case Law",
                desc: "Learning about Indian legal cases and conducting in depth research on them.",
                link: "read/article4.html",
                photo: "read/author4.jpg", 
                accent: "#10b981",
                readTime: "15 min",
                date: "20 apr 2026"
             },
            {
                id: "04",
                author: "Bishal Soren",
                university: "Surendranath Law College",
                title: "Constitutional Framework",
                desc: "Analyzing the 'Rule of Law' and the structural backbone of our democratic nation.",
                link: "read/article3.html",
                photo: "read/author3.jpg", 
                accent: "#f59e0b",
                readTime: "13 min",
                date: "19 apr 2026"
            }
        ];

        const container = document.getElementById('articles-hub');
        const modal = document.getElementById('article-modal');
        const modalBody = document.getElementById('modal-body');

        const openModal = (id) => {
            const art = articleDatabase.find(a => a.id === id);
            modalBody.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <img src="${art.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${art.author.replace(' ', '+')}&background=${art.accent.replace('#','')}&color=fff'" class="w-16 h-16 rounded-2xl object-cover">
                    <div>
                        <h4 class="font-bold text-slate-900">${art.author}</h4>
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">${art.university}</p>
                    </div>
                </div>
                <h3 class="text-2xl font-extrabold text-slate-900 leading-tight mb-4">${art.title}</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-8">${art.desc} This research explores the fundamental aspects and practical implications in modern Indian law.</p>
                
                <a href="${art.link}" class="flex items-center justify-between bg-slate-900 text-white p-5 rounded-2xl shadow-xl shadow-blue-100 hover:bg-blue-600 transition-colors">
                    <span class="text-xs font-bold uppercase tracking-widest">Read Full Article</span>
                    <i class="fa-solid fa-arrow-right-long"></i>
                </a>

                <div class="mt-8 pt-6 border-t border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">More from this Author</p>
                    <div class="bg-slate-50 p-3 rounded-xl flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-600">Legal Research Methods...</span>
                        <i class="fa-solid fa-lock text-[10px] text-slate-300"></i>
                    </div>
                </div>
            `;
            modal.classList.add('active');
        };

        const closeModal = (e) => {
            modal.classList.remove('active');
        };

        const renderArticles = () => {
            container.innerHTML = "";
            articleDatabase.forEach((art, index) => {
                const card = document.createElement('div');
                card.className = `premium-card relative p-6`;
                card.onclick = () => openModal(art.id);
                
                card.innerHTML = `
                    <div class="accent-line" style="background: ${art.accent}"></div>
                    <div class="flex justify-between items-start mb-5">
                        <div class="flex items-center gap-3">
                            <img src="${art.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${art.author.replace(' ', '+')}&background=${art.accent.replace('#','')}&color=fff'" 
                                     class="w-12 h-12 rounded-2xl object-cover shadow-sm ring-4 ring-slate-50">
                            <div>
                                <div class="flex items-center gap-1.5">
                                    <h4 class="font-bold text-slate-900 text-sm tracking-tight">${art.author}</h4>
                                    <i class="fa-solid fa-circle-check text-blue-500 text-[11px]"></i>
                                </div>
                                <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-tighter">${art.university}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="meta-text">${art.date}</p>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-xl font-extrabold text-slate-900 leading-tight mb-2 tracking-tight">${art.title}</h3>
                        <p class="text-[12px] text-slate-500 line-clamp-2 font-medium">${art.desc}</p>
                    </div>
                    <div class="mt-4 flex items-center text-blue-600 font-bold text-[10px] uppercase tracking-widest">
                        View Profile & Articles <i class="fa-solid fa-chevron-right ml-2 text-[8px]"></i>
                    </div>
                `;
                container.appendChild(card);
                setTimeout(() => { card.classList.add('show'); }, index * 120);
            });
        };

        window.onload = renderArticles;
    </script>
</body>
</html>
