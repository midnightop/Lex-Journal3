<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Article Hub | Law Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            color: #1e293b; 
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .premium-card {
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease-out;
        }

        .premium-card.show { opacity: 1; transform: translateY(0); }

        .read-btn {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            padding: 10px;
            border-radius: 14px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 glass-nav px-5 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-8 h-8 bg-white border border-slate-100 flex items-center justify-center rounded-xl shadow-sm text-slate-800">
                <i class="fa-solid fa-arrow-left text-xs"></i>
            </a>
            <h1 class="font-black text-slate-900 text-base tracking-tighter">LAW <span class="text-blue-600">JOURNAL</span></h1>
        </div>
    </nav>

    <main class="px-5 py-6 pb-24">
        <header class="mb-6">
            <h2 class="text-3xl font-serif font-bold text-slate-900 leading-tight">Research <span class="text-blue-600">Hub</span></h2>
        </header>

        <div id="articles-hub" class="space-y-4">
            <div class="premium-card p-4 h-40 loading-shimmer"></div>
        </div>
    </main>

    <script>
        const articleDatabase = [
            {
                id: "01",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law | CU",
                title: "Advantages of Bare Acts",
                desc: "Accuracy and precision of raw legal texts in education.",
                link: "read/article1.html",
                photo: "read/author1.jpg", 
                accent: "#2563eb"
            },
            {
                id: "02",
                author: "Rey",
                university: "Surendranath Law | CU",
                title: "Why Law is Important",
                desc: "Journey through the evolution of legal systems in India.",
                link: "read/article2.html",
                photo: "read/author2.jpg", 
                accent: "#0f172a"
            },
            {
                id: "03",
                author: "Bishal Soren",
                university: "Surendranath Law | CU",
                title: "The Constitution",
                desc: "Analytical exploration of the foundational rules of nation-states.",
                link: "read/article3.html",
                photo: "read/author3.jpg", 
                accent: "#1e3a8a"
             },
            {
                id: "04",
                author: "Analdeep Samanta",
                university: "South Calcutta Law | CU",
                title: "What is Case Law?",
                desc: "In-depth research on Indian legal precedents and cases.",
                link: "read/article4.html",
                photo: "read/author4.jpg", 
                accent: "#065f46"
            }
        ];

        const container = document.getElementById('articles-hub');

        const renderArticles = () => {
            container.innerHTML = "";
            articleDatabase.forEach((art, index) => {
                const card = document.createElement('div');
                card.className = `premium-card p-4`;
                card.style.borderLeft = `5px solid ${art.accent}`;
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <img src="${art.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${art.author.replace(' ', '+')}&background=2563eb&color=fff'" 
                                 class="w-10 h-10 rounded-xl shadow-sm border border-white object-cover">
                            <div>
                                <div class="flex items-center gap-1">
                                    <h4 class="font-black text-slate-800 text-xs">${art.author}</h4>
                                    <i class="fa-solid fa-circle-check text-blue-500 text-[8px]"></i>
                                </div>
                                <p class="text-[7px] text-slate-400 font-bold uppercase">${art.university}</p>
                            </div>
                        </div>
                        <span class="text-[9px] font-bold text-slate-300">#${art.id}</span>
                    </div>

                    <div class="mb-4">
                        <h3 class="text-sm font-black text-slate-900 leading-tight mb-1 uppercase tracking-tighter">${art.title}</h3>
                        <p class="text-[10px] text-slate-500 leading-tight line-clamp-1 italic">"${art.desc}"</p>
                    </div>

                    <a href="${art.link}" class="read-btn">
                        Read Article <i class="fa-solid fa-arrow-right ml-2"></i>
                    </a>
                `;
                container.appendChild(card);
                setTimeout(() => { card.classList.add('show'); }, index * 100);
            });
        };

        window.onload = renderArticles;
    </script>
</body>
</html>
