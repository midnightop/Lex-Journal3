<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Article Hub | Law Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        * { -webkit-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            color: #1e293b; 
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .premium-card {
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .premium-card.show { opacity: 1; transform: translateY(0); }

        .premium-card:active { transform: scale(0.97); }

        .read-btn {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            padding: 15px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 glass-nav px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="w-10 h-10 bg-white border border-slate-100 flex items-center justify-center rounded-2xl shadow-sm text-slate-800">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <h1 class="font-black text-slate-900 text-lg tracking-tighter">LAW <span class="text-blue-600">JOURNAL</span></h1>
        </div>
    </nav>

    <main class="px-6 py-8 pb-32">
        <header class="mb-10">
            <h2 class="text-4xl font-serif font-bold text-slate-900 leading-tight">Article <br><span class="text-blue-600 underline decoration-blue-100 underline-offset-8">Research Hub</span></h2>
        </header>

        <div id="articles-hub" class="space-y-8">
            <div class="premium-card p-6 h-64 loading-shimmer"></div>
        </div>
    </main>

    <script>
        // DATA CENTER - Yahan 2nd Article (Rey) add kar diya hai
        const articleDatabase = [
            {
                id: "01",
                author: "Ettisa Basak",
                university: "Sureswar Dutta Law College | University of Calcutta",
                title: "The Advantages of Using Bare Acts",
                desc: "Accuracy, precision, and the fundamental authority of Bare Acts in legal education.",
                link: "read/article1.html",
                photo: "read/author1.jpg", 
                accent: "#2563eb"
            },
            {
                id: "02",
                author: "Rey",
                university: "Surendranath Law College | University of Calcutta",
                title: "Why Law is Important",
                desc: "A deep dive into the origin, necessity, and evolution of legal systems in India.",
                link: "read/article2.html",
                photo: "read/author2.jpg", 
                accent: "#0f172a"
            },
             {
                id: "03",
                author: "Bishal Soren",
                university: "Surendranath Law College | University of Calcutta",
                title: "The constitution: The Rules That Run a Nation ",
                desc: "An analytical exploration of the foundational rules, structural necessity, and the historical evolution of modern nation-states.",
                link: "read/article3.html",
                photo: "read/author3.jpg", 
                accent: "#1e3a8a"
             },
            {
                id: "04",
                author: "Analdeep Samanta",
                university: "South Calcutta Law College | University of Calcutta",
                title: "The constitution: The Rules That Run a Nation ",
                desc: "An analytical exploration of the foundational rules, structural necessity, and the historical evolution of modern nation-states.",
                link: "read/article4.html",
                photo: "read/author4.jpg", 
                accent: "#065f46"
            }
        ];

        const container = document.getElementById('articles-hub');

        const renderArticles = () => {
            container.innerHTML = "";
            articleDatabase.forEach((art, index) => {
                const card = document.createElement('div');
                card.className = `premium-card p-6`;
                card.style.borderLeft = `6px solid ${art.accent}`;
                
                card.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <img src="${art.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${art.author.replace(' ', '+')}&background=2563eb&color=fff'" 
                             class="w-14 h-14 rounded-[22px] shadow-md border-2 border-white object-cover">
                        <div>
                            <div class="flex items-center gap-1">
                                <h4 class="font-black text-slate-800 text-sm">${art.author}</h4>
                                <i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i>
                            </div>
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-tight">${art.university}</p>
                        </div>
                    </div>

                    <div class="bg-slate-50/50 rounded-3xl p-5 mb-6 border border-slate-100 shadow-inner">
                        <h3 class="text-lg font-black text-slate-900 leading-tight mb-2 uppercase tracking-tighter">${art.title}</h3>
                        <p class="text-[11px] text-slate-500 leading-relaxed italic line-clamp-2">"${art.desc}"</p>
                    </div>

                    <a href="${art.link}" class="read-btn">
                        Open Research <i class="fa-solid fa-arrow-right-long ml-2"></i>
                    </a>
                `;
                container.appendChild(card);
                setTimeout(() => { card.classList.add('show'); }, index * 150);
            });
        };

        window.onload = renderArticles;

        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73 || e.keyCode === 83)) return false;
        };
    </script>
</body>
</html>
