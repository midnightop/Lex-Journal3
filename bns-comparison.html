<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPC vs BNS | 2023 Reform Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; -webkit-user-select: none; user-select: none; overflow-x: hidden; }

        /* Premium Search Bar UI */
        .search-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        #masterSearch {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #masterSearch:focus {
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        /* Improved Navigation Chips */
        .nav-chip {
            padding: 10px 22px; border-radius: 50px; font-size: 11px; font-weight: 700;
            background: #ffffff; border: 1px solid #e2e8f0; color: #64748b; 
            transition: all 0.2s ease; cursor: pointer;
        }
        .nav-chip.active { 
            background: #1e293b; color: #ffffff; border-color: #1e293b; 
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2); 
        }

        .sec-card {
            background: white; border-radius: 20px; border: 1px solid #f1f5f9;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .sec-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }

        .tag-ipc { background: #f1f5f9; color: #475569; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 6px; }
        .tag-bns { background: #fee2e2; color: #b91c1c; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 6px; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md px-5 py-4 flex justify-between items-center border-b border-gray-100">
        <span class="font-black text-gray-900 tracking-tighter text-xl uppercase italic">IPC <span class="text-red-600 font-serif">vs</span> BNS</span>
        <div class="w-10 h-10 bg-gray-50 text-gray-800 rounded-full flex items-center justify-center border border-gray-200">
            <i class="fa-solid fa-arrow-left text-xs"></i>
        </div>
    </nav>

    <header class="pt-10 pb-6 px-6 text-center">
        <div class="inline-block px-3 py-1 bg-red-50 text-red-600 text-[9px] font-black rounded-lg uppercase tracking-widest mb-3">2023 Reform</div>
        <h1 class="text-4xl font-black text-gray-900 tracking-tighter uppercase">Legal <span class="text-gray-400">Decode</span></h1>
    </header>

    <div class="sticky top-[70px] z-40 search-container mx-4 p-2 rounded-3xl mb-6">
        <div class="relative mb-4">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="masterSearch" placeholder="Search sections..." 
                class="w-full pl-12 pr-6 py-4 bg-transparent outline-none font-bold text-sm text-gray-700">
        </div>
        
        <div class="flex gap-2 overflow-x-auto no-scrollbar px-1 pb-1">
            <button onclick="filter('all', this)" class="nav-chip active">All</button>
            <button onclick="filter('Body', this)" class="nav-chip">Body</button>
            <button onclick="filter('Women', this)" class="nav-chip">Women</button>
            <button onclick="filter('Property', this)" class="nav-chip">Property</button>
            <button onclick="filter('State', this)" class="nav-chip">State</button>
        </div>
    </div>

    <main class="px-5 space-y-4 max-w-xl mx-auto" id="renderZone"></main>

    <script>
        const data = [
            { cat: 'General', name: "Short Title", ipc: "1", bns: "1", desc: "Operation of the Sanhita." },
            { cat: 'Women', name: "Rape", ipc: "375-376", bns: "63-64", desc: "Punishment for sexual assault." },
            { cat: 'Body', name: "Murder", ipc: "302", bns: "103", desc: "Punishment for causing death." },
            { cat: 'Property', name: "Theft", ipc: "378", bns: "303", desc: "Removal of movable property." }
        ];

        const zone = document.getElementById('renderZone');
        const searchInput = document.getElementById('masterSearch');

        function paint(list) {
            zone.innerHTML = list.map(i => `
                <div class="sec-card p-5">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="text-xs font-black text-gray-800 uppercase">${i.name}</h4>
                        <div class="flex gap-1">
                            <span class="tag-ipc">IPC ${i.ipc}</span>
                            <span class="tag-bns">BNS ${i.bns}</span>
                        </div>
                    </div>
                    <p class="text-[11px] text-gray-500 leading-relaxed font-medium">${i.desc}</p>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            paint(data.filter(i => i.name.toLowerCase().includes(val)));
        });

        function filter(cat, btn) {
            document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            cat === 'all' ? paint(data) : paint(data.filter(i => i.cat === cat));
        }

        paint(data);
    </script>
</body>
</html>
