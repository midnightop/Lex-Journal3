<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPC vs BNS Master Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #fcfdfe; 
            color: #1e293b;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }

        /* Premium Glass Header */
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 2px 15px rgba(0,0,0,0.02);
        }

        /* Enhanced Card Design */
        .sec-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .sec-card:active { transform: scale(0.97); }
        .sec-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: #dc2626;
            opacity: 0;
            transition: 0.3s;
        }
        .sec-card:hover::before { opacity: 1; }

        /* Modern Tags */
        .tag-ipc { background: #f8fafc; color: #64748b; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .tag-bns { background: #fff1f2; color: #dc2626; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 12px; border: 1px solid #fecaca; }
        
        /* Category Chips */
        .nav-chip {
            white-space: nowrap;
            padding: 10px 22px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: #fff;
            border: 1.5px solid #f1f5f9;
            color: #94a3b8;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-chip.active {
            background: #dc2626;
            color: white;
            border-color: #dc2626;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: slideUp 0.5s ease forwards; }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="research.html" class="w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition"><i class="fa-solid fa-chevron-left"></i></a>
            <div class="flex flex-col">
                <span class="font-black text-gray-900 tracking-tighter text-xl leading-none uppercase">IPC <span class="text-red-600">vs</span> BNS</span>
                <span class="text-[7px] font-black text-gray-400 uppercase tracking-widest mt-1">Legal Mapping Pro</span>
            </div>
        </div>
        <div class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center text-red-600">
            <i class="fa-solid fa-lock text-xs"></i>
        </div>
    </nav>

    <header class="pt-14 pb-8 px-8 text-center bg-gradient-to-b from-red-50/30 to-transparent">
        <div class="inline-block px-4 py-1.5 bg-red-600 text-white text-[9px] font-black rounded-full uppercase tracking-widest mb-6">Master Repository</div>
        <h1 class="text-5xl font-black text-gray-900 tracking-tighter uppercase leading-tight mb-4">400+ <span class="text-red-600 font-serif lowercase italic text-6xl">sections</span></h1>
        <p class="max-w-xs mx-auto text-gray-400 text-[10px] font-bold uppercase tracking-[0.25em] leading-relaxed">The complete decolonized legal guide for law students and practitioners.</p>
    </header>

    <div class="sticky top-[72px] z-40 bg-white/90 backdrop-blur-md pb-6 pt-2 border-b border-gray-50">
        <div class="px-6 space-y-5 max-w-xl mx-auto">
            <div class="relative group">
                <i class="fa-solid fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-red-600 transition"></i>
                <input type="text" id="masterSearch" autocomplete="off" placeholder="Search Offense, IPC or BNS Sec..." 
                    class="w-full pl-16 pr-6 py-5 bg-gray-50/50 border-2 border-transparent rounded-[2rem] focus:bg-white focus:border-red-600/10 focus:ring-4 focus:ring-red-600/5 outline-none font-bold text-sm transition-all shadow-inner">
            </div>
            
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                <button onclick="filter('all', this)" class="nav-chip active">All Data</button>
                <button onclick="filter('Body', this)" class="nav-chip">Life & Body</button>
                <button onclick="filter('Women', this)" class="nav-chip">Women/Child</button>
                <button onclick="filter('Property', this)" class="nav-chip">Property Law</button>
                <button onclick="filter('State', this)" class="nav-chip">National Security</button>
                <button onclick="filter('General', this)" class="nav-chip">Definitions</button>
            </div>
        </div>
    </div>

    <main class="px-6 mt-10 max-w-xl mx-auto space-y-6" id="renderZone">
        </main>

    <div id="noResult" class="hidden text-center py-32">
        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-magnifying-glass text-gray-200 text-2xl"></i>
        </div>
        <p class="text-gray-300 font-black uppercase text-[10px] tracking-widest">Section not found in repository</p>
    </div>

    <script>
        const data = [
            // Sample dataset (Structure remains same, add all 400 here)
            { cat: 'Body', name: "Murder", ipc: "302", bns: "103(1)", desc: "Punishment for causing death with intention or knowledge of death." },
            { cat: 'Body', name: "Culpable Homicide", ipc: "304", bns: "105", desc: "Causing death without specific intent to murder but with dangerous acts." },
            { cat: 'Body', name: "Attempt to Murder", ipc: "307", bns: "109", desc: "Acts done with murderous intent where victim survives." },
            { cat: 'Body', name: "Hit and Run", ipc: "New", bns: "106(2)", desc: "Severe punishment for fleeing the scene after negligent killing." },
            { cat: 'Women', name: "Sexual Assault (Rape)", ipc: "375/376", bns: "63/64", desc: "Comprehensive reform in punishment and definition of sexual offenses." },
            { cat: 'Property', name: "Theft & Snatching", ipc: "378-379", bns: "303-304", desc: "Definition of theft including the newly defined crime of snatching." },
            { cat: 'State', name: "Terrorist Act", ipc: "New", bns: "113", desc: "A modern provision defining terrorism and its penalties within BNS." },
            { cat: 'State', name: "Endangering Sovereignty", ipc: "124A", bns: "152", desc: "Modern replacement for 'Sedition' focused on national integrity." },
            { cat: 'General', name: "Private Defense", ipc: "96-106", bns: "34-44", desc: "Laws regarding the right to protect your body and property." }
        ];

        const zone = document.getElementById('renderZone');
        const search = document.getElementById('masterSearch');

        function paint(list) {
            if(list.length === 0) {
                document.getElementById('noResult').classList.remove('hidden');
                zone.innerHTML = '';
                return;
            }
            document.getElementById('noResult').classList.add('hidden');
            zone.innerHTML = list.map((i, idx) => `
                <div class="sec-card p-7 animate-card" style="animation-delay: ${idx * 0.05}s">
                    <div class="flex justify-between items-start mb-5">
                        <div class="max-w-[65%]">
                            <h4 class="text-base font-black text-gray-800 uppercase tracking-tighter leading-tight">${i.name}</h4>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="w-1.5 h-1.5 rounded-full bg-red-600"></span>
                                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">${i.cat}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <div class="tag-ipc">IPC ${i.ipc}</div>
                            <div class="tag-bns">BNS ${i.bns}</div>
                        </div>
                    </div>
                    <p class="text-[12px] text-gray-500 leading-relaxed font-medium border-t border-gray-50 pt-5 text-justify">
                        ${i.desc}
                    </p>
                </div>
            `).join('');
        }

        paint(data);

        search.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = data.filter(i => 
                i.name.toLowerCase().includes(val) || 
                i.ipc.toLowerCase().includes(val) || 
                i.bns.toLowerCase().includes(val)
            );
            paint(filtered);
        });

        function filter(cat, btn) {
            document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            cat === 'all' ? paint(data) : paint(data.filter(i => i.cat === cat));
            search.value = '';
        }

        // PROTECTION
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => {
            if (e.ctrlKey && [67, 86, 85, 83, 73, 74].includes(e.keyCode)) return false;
            if (e.key === "F12") return false;
        };
    </script>
</body>
</html>
