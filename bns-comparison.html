<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNS vs IPC | Protected Master Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            /* UI Protection */
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        #sectionSearch:focus {
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.1);
            border-color: #dc2626;
        }

        .mapping-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #edf2f7;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            position: relative;
        }

        .ipc-chip { background: #f1f5f9; color: #64748b; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 10px; }
        .bns-chip { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 10px; }

        .tab-btn {
            white-space: nowrap; padding: 8px 20px; border-radius: 14px; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; background: white; border: 1px solid #e2e8f0; color: #94a3b8; transition: 0.3s;
        }
        .tab-btn.active { background: #dc2626; color: white; border-color: #dc2626; box-shadow: 0 8px 15px rgba(220, 38, 38, 0.2); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="research.html" class="w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <span class="font-black text-gray-900 tracking-tighter text-xl uppercase">Legal <span class="text-red-600">Locked</span></span>
        </div>
        <i class="fa-solid fa-shield-halved text-red-600"></i>
    </nav>

    <header class="pt-12 pb-8 px-8 max-w-2xl mx-auto text-center">
        <h2 class="text-5xl font-black text-slate-900 leading-tight tracking-tighter uppercase">BNS <span class="text-red-600 italic font-serif lowercase">vs</span> IPC</h2>
        <p class="mt-6 text-slate-500 text-sm font-medium leading-relaxed max-w-sm mx-auto">
            Protected Research Repository. This page is locked for copy/paste to ensure data integrity.
        </p>
    </header>

    <div class="sticky top-20 z-40 bg-f8fafc/80 backdrop-blur-md px-6 py-4">
        <div class="max-w-xl mx-auto space-y-5">
            <div class="relative group">
                <i class="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-600 transition"></i>
                <input type="text" id="sectionSearch" autocomplete="off" placeholder="Quick Search (Murder, 302, 103...)" 
                    class="w-full pl-14 pr-6 py-5 bg-white border border-slate-200 rounded-[2rem] shadow-sm outline-none transition-all text-sm font-bold">
            </div>
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                <button onclick="filterCategory('all', this)" class="tab-btn active">All</button>
                <button onclick="filterCategory('life', this)" class="tab-btn">Body</button>
                <button onclick="filterCategory('women', this)" class="tab-btn">Women</button>
                <button onclick="filterCategory('property', this)" class="tab-btn">Property</button>
                <button onclick="filterCategory('state', this)" class="tab-btn">State</button>
            </div>
        </div>
    </div>

    <main class="px-6 mt-6 max-w-xl mx-auto">
        <div id="mappingList" class="space-y-5"></div>
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fa-solid fa-ghost text-4xl text-gray-200 mb-4"></i>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest">No matching section</p>
        </div>
    </main>

    <script>
        // --- DATA ---
        const mappingData = [
            { category: 'life', offense: "Murder", ipc: "302", bns: "103(1)", desc: "Intentional killing of a human being." },
            { category: 'life', offense: "Culpable Homicide", ipc: "304", bns: "105", desc: "Death caused with knowledge but no direct intent to murder." },
            { category: 'life', offense: "Attempt to Murder", ipc: "307", bns: "109", desc: "Acts done with murderous intent but life is saved." },
            { category: 'life', offense: "Negligent Death", ipc: "304A", bns: "106(1)", desc: "Death caused by rash or negligent acts." },
            { category: 'life', offense: "Hit & Run", ipc: "New", bns: "106(2)", desc: "Escaping the scene after negligent killing without reporting." },
            { category: 'women', offense: "Rape", ipc: "376", bns: "64", desc: "Sexual assault without consent; chapter V reorganization." },
            { category: 'women', offense: "Gang Rape", ipc: "376D", bns: "70(1)", desc: "Rape committed by multiple persons in a group." },
            { category: 'property', offense: "Theft", ipc: "379", bns: "303(2)", desc: "Dishonest removal of movable property." },
            { category: 'property', offense: "Snatching", ipc: "New", bns: "304", desc: "Newly defined offense for sudden grabbing from person." },
            { category: 'state', offense: "Anti-State Acts", ipc: "124A", bns: "152", desc: "Endangering Sovereignty and Integrity (Replaces Sedition)." }
            // Add more as needed...
        ];

        const listContainer = document.getElementById('mappingList');
        const searchInput = document.getElementById('sectionSearch');

        function render(data) {
            if(data.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                listContainer.innerHTML = '';
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                listContainer.innerHTML = data.map((item, index) => `
                    <div class="mapping-card p-6 animate-in" style="animation-delay: ${index * 0.05}s">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-slate-800 text-base uppercase tracking-tighter">${item.offense}</h3>
                                <p class="text-[9px] text-red-600 font-black uppercase mt-1">${item.category}</p>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <span class="ipc-chip">IPC ${item.ipc}</span>
                                <span class="bns-chip">BNS ${item.bns}</span>
                            </div>
                        </div>
                        <p class="text-xs text-slate-500 leading-relaxed font-bold border-t border-slate-50 pt-4">${item.desc}</p>
                    </div>
                `).join('');
            }
        }

        render(mappingData);

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = mappingData.filter(i => i.offense.toLowerCase().includes(val) || i.ipc.includes(val) || i.bns.includes(val));
            render(filtered);
        });

        function filterCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            cat === 'all' ? render(mappingData) : render(mappingData.filter(i => i.category === cat));
            searchInput.value = '';
        }

        // --- HARDCORE PROTECTION SCRIPTS ---

        // 1. Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Disable Keyboard Shortcuts (Ctrl+C, Ctrl+V, Ctrl+U, Ctrl+Shift+I, etc.)
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73 || e.keyCode === 74)) {
                return false;
            }
            if (e.key === "F12") {
                return false;
            }
        };

        // 3. Disable Selection (Mobile & Desktop)
        document.addEventListener('selectstart', e => e.preventDefault());

        // 4. Disable Drag and Drop
        document.addEventListener('dragstart', e => e.preventDefault());

    </script>
</body>
</html>
