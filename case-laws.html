<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Judgments | CLJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Vibrant Blurs Background */
        .blur-bg { position: fixed; z-index: -1; filter: blur(60px); opacity: 0.25; pointer-events: none; }
        
        .modal-overlay { opacity: 0; visibility: hidden; transition: all 0.3s ease; display: flex; align-items: flex-end; }
        @media (min-width: 768px) { .modal-overlay { align-items: center; } }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-container { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-container { transform: translateY(0); }

        .search-focus:focus-within { border-color: #ec4899; box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2); transform: scale(1.01); }
        
        .case-card { transition: all 0.4s ease; }
        .case-card.hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div class="blur-bg bg-pink-400 w-64 h-64 -top-10 -left-10"></div>
    <div class="blur-bg bg-blue-400 w-64 h-64 top-1/2 -right-10"></div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-2xl px-4 py-4 md:px-10 md:py-6 flex justify-between items-center border-b border-gray-100">
        <h1 class="font-black text-gray-800 text-xl md:text-2xl tracking-tighter">CLJ <span class="text-pink-500">Cases</span></h1>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-pink-600 bg-pink-50 px-5 py-2.5 rounded-full shadow-sm active:scale-90 transition">Home</a>
    </nav>

    <header class="pt-12 pb-8 px-6 text-center">
        <h1 class="text-4xl md:text-7xl font-serif font-bold text-gray-800 mb-2 tracking-tight leading-tight">Landmark <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">Judgments</span></h1>
        
        <div class="max-w-md mx-auto mt-10 mb-12 relative search-focus transition-all duration-300 border-2 border-white rounded-2xl bg-white/90 backdrop-blur-md flex items-center px-5 shadow-xl">
            <i class="fa-solid fa-magnifying-glass text-pink-500 text-lg"></i>
            <input type="text" id="caseSearch" onkeyup="searchCases()" placeholder="Search Cases..." class="w-full py-4 px-4 text-base font-bold outline-none bg-transparent text-gray-700 placeholder:text-gray-300">
        </div>
    </header>

    <main class="px-5 space-y-8 max-w-lg mx-auto" id="casesContainer"></main>

    <div id="caseModal" class="modal-overlay fixed inset-0 z-[100] bg-black/60 backdrop-blur-md justify-center">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-full max-w-xl h-[90vh] md:h-auto md:max-h-[85vh] rounded-t-[3rem] md:rounded-[3rem] shadow-2xl overflow-hidden relative flex flex-col">
            
            <div class="px-6 py-5 border-b border-gray-50 flex justify-between items-center sticky top-0 bg-white z-10">
                <h3 class="font-black text-gray-800 text-base" id="modalTitle">Case Details</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div class="p-8 overflow-y-auto no-scrollbar space-y-10 pb-20 text-left">
                <div>
                    <h4 class="text-pink-500 font-black text-[10px] uppercase tracking-widest mb-3">Background Story</h4>
                    <p id="modalDescription" class="text-gray-600 text-2xl leading-relaxed font-serif italic mb-4"></p>
                    <p id="modalFacts" class="text-gray-500 text-base leading-relaxed font-medium"></p>
                </div>

                <div class="bg-gradient-to-br from-pink-50 to-purple-50 p-6 rounded-3xl border-l-4 border-pink-400">
                    <h4 class="text-pink-600 font-black text-[10px] uppercase tracking-widest mb-2">The Legal Issue</h4>
                    <p id="modalIssue" class="text-pink-950 text-lg font-bold leading-snug"></p>
                </div>

                <div>
                    <h4 class="text-gray-800 font-black text-[10px] uppercase tracking-widest mb-6">Final Verdict</h4>
                    <ul id="modalVerdict" class="space-y-4 text-gray-600 text-base leading-relaxed font-bold"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const caseDatabase = {
            'kesavananda': { 
                title: "Kesavananda Bharati (1973)", cat: "Constitution",
                desc: "The battle led by Swami Kesavananda Bharati against the state.",
                facts: "Swami Kesavananda Bharati challenged the Kerala government's land reform laws. 13 Judges sat for 68 days to decide if Parliament could destroy our basic rights.", 
                issue: "Can Parliament change the 'Basic Structure' of our Constitution?", 
                verdict: ["Parliament cannot touch Basic Structure.", "Democracy and Secularism are safe.", "Nani Palkhivala saved Indian democracy."] 
            },
            'maneka': { 
                title: "Maneka Gandhi (1978)", cat: "Article 21",
                desc: "Maneka Gandhi fought for her right to travel and personal freedom.",
                facts: "Her passport was impounded 'in public interest' without any hearing. She argued this violated her dignity and rights under Article 21.", 
                issue: "Is any procedure established by law always fair and just?", 
                verdict: ["Laws must be Just, Fair, and Reasonable.", "Travel is a Personal Liberty.", "Art. 14, 19, and 21 are inseparable."] 
            },
            'puttaswamy': { 
                title: "K.S. Puttaswamy (2017)", cat: "Privacy",
                desc: "Justice Puttaswamy challenged the state to recognize privacy.",
                facts: "This case started with a challenge to Aadhaar. 9 Judges unanimously decided that every Indian has a right to their own data.", 
                issue: "Is the Right to Privacy a Fundamental Right?", 
                verdict: ["Privacy is an absolute part of Life.", "Digital data is protected.", "State surveillance must have limits."] 
            },
            'vishaka': { 
                title: "Vishaka v. Rajasthan (1997)", cat: "Women Rights",
                desc: "Bhanwari Devi's struggle led to workplace safety guidelines.",
                facts: "A social worker was gang-raped, and there were no laws to protect women at work. SC created the 'Vishaka Guidelines'.", 
                issue: "How to safeguard women at work without a specific act?", 
                verdict: ["Vishaka Guidelines are mandatory.", "Employers must form ICC committees.", "Foundation for POSH Act 2013."] 
            }
        };

        const container = document.getElementById('casesContainer');
        Object.keys(caseDatabase).forEach(key => {
            const data = caseDatabase[key];
            container.innerHTML += `
                <div class="case-card bg-white/90 backdrop-blur-md rounded-[2.5rem] p-8 shadow-xl border border-white relative overflow-hidden" data-title="${data.title} ${data.cat}">
                    <div class="mb-6">
                        <span class="bg-pink-600 text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">${data.cat}</span>
                    </div>
                    <h2 class="text-3xl font-black text-gray-800 tracking-tight leading-tight">${data.title}</h2>
                    <p class="text-gray-400 text-sm mt-3 mb-8 font-medium leading-relaxed">${data.desc}</p>
                    <button onclick="openModal('${key}')" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-pink-100 active:scale-95 transition-all">Analyse Case</button>
                </div>
            `;
        });

        function searchCases() {
            let input = document.getElementById('caseSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('case-card');
            for (let i = 0; i < cards.length; i++) {
                let content = cards[i].getAttribute('data-title').toLowerCase();
                if (content.includes(input)) cards[i].classList.remove('hidden');
                else cards[i].classList.add('hidden');
            }
        }

        function openModal(key) {
            const data = caseDatabase[key];
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalDescription').innerText = data.desc;
            document.getElementById('modalFacts').innerText = data.facts;
            document.getElementById('modalIssue').innerText = data.issue;
            const verdictUl = document.getElementById('modalVerdict');
            verdictUl.innerHTML = '';
            data.verdict.forEach(point => {
                verdictUl.innerHTML += `<li class="flex gap-4"><i class="fa-solid fa-check-circle text-pink-500 mt-1"></i><span>${point}</span></li>`;
            });
            document.getElementById('caseModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
