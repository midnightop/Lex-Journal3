<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Judgments | CLJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfdfe; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .blur-bg { position: fixed; z-index: -1; filter: blur(60px); opacity: 0.25; pointer-events: none; }
        
        .modal-overlay { opacity: 0; visibility: hidden; transition: all 0.3s ease; display: flex; align-items: flex-end; }
        @media (min-width: 768px) { .modal-overlay { align-items: center; } }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-container { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-container { transform: translateY(0); }

        .search-focus:focus-within { border-color: #ec4899; box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2); }
        
        .case-card { transition: all 0.3s ease; border-top: 4px solid #ec4899; }
        .case-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .case-card.hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .opinion-box { background: #fff1f2; border-left: 4px solid #be185d; padding: 1.5rem; border-radius: 1.5rem; }
    </style>
</head>
<body class="pb-10">

    <div class="blur-bg bg-pink-400 w-64 h-64 -top-10 -left-10"></div>
    <div class="blur-bg bg-blue-400 w-64 h-64 top-1/2 -right-10"></div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-2xl px-4 py-4 md:px-10 md:py-6 flex justify-between items-center border-b border-gray-100">
        <h1 class="font-black text-gray-800 text-xl md:text-2xl tracking-tighter">CLJ <span class="text-pink-500">Cases</span></h1>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-pink-600 bg-pink-50 px-5 py-2.5 rounded-full shadow-sm active:scale-90 transition">Home</a>
    </nav>

    <header class="pt-10 pb-6 px-6 text-center">
        <h1 class="text-4xl md:text-7xl font-serif font-bold text-gray-800 mb-2 tracking-tight leading-tight">Landmark <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">Judgments</span></h1>
        
        <div class="max-w-md mx-auto mt-8 mb-10 relative search-focus transition-all duration-300 border-2 border-white rounded-2xl bg-white/90 backdrop-blur-md flex items-center px-5 shadow-xl">
            <i class="fa-solid fa-magnifying-glass text-pink-500 text-lg"></i>
            <input type="text" id="caseSearch" onkeyup="searchCases()" placeholder="Search Cases..." class="w-full py-4 px-4 text-base font-bold outline-none bg-transparent text-gray-700 placeholder:text-gray-300">
        </div>
    </header>

    <main class="px-5 grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto" id="casesContainer"></main>

    <div id="caseModal" class="modal-overlay fixed inset-0 z-[100] bg-black/60 backdrop-blur-md justify-center">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-full max-w-2xl h-[92vh] md:h-[85vh] rounded-t-[2.5rem] md:rounded-[3rem] shadow-2xl overflow-hidden relative flex flex-col">
            
            <div class="px-6 py-5 border-b border-gray-50 flex justify-between items-center sticky top-0 bg-white z-10">
                <h3 class="font-black text-gray-800 text-base">Case Analysis</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div class="p-8 overflow-y-auto no-scrollbar space-y-12 pb-24 text-left">
                <div>
                    <h4 class="text-pink-500 font-black text-[10px] uppercase tracking-widest mb-4">Background Facts</h4>
                    <p id="modalDescription" class="text-gray-800 text-3xl leading-tight font-serif italic mb-6"></p>
                    <div id="modalLongFacts" class="text-gray-600 text-base leading-relaxed space-y-6"></div>
                </div>

                <div class="bg-gray-50 p-8 rounded-[2rem]">
                    <h4 class="text-gray-800 font-black text-[10px] uppercase tracking-widest mb-6">10 Key Points</h4>
                    <ul id="modalPoints" class="space-y-4 text-gray-700 text-sm font-semibold"></ul>
                </div>

                <div class="opinion-box">
                    <h4 class="text-pink-700 font-black text-[10px] uppercase tracking-widest mb-3">My Opinion</h4>
                    <p id="modalOpinion" class="text-pink-900 text-base italic leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const caseDatabase = {
            'kesavananda': { 
                title: "Kesavananda Bharati (1973)", 
                cat: "Constitution",
                desc: "The battle for the soul of the Constitution.",
                longFacts: "<p>The landmark 13-judge bench decision that saved Indian democracy. It limited the power of Parliament to amend the Constitution by introducing the 'Basic Structure Doctrine'.</p><p>This case ensures that the core identity of India (Secularism, Democracy, Federalism) remains unchangeable even by a 2/3rd majority in Parliament.</p>",
                points: ["Basic Structure Doctrine born.", "Parliament cannot destroy core features.", "Judicial Review is essential.", "Supremacy of Constitution.", "Rule of Law is vital.", "Preamble is part of Constitution.", "Overruled Golaknath.", "Limited amendment power.", "Checks and Balances.", "Safeguard against tyranny."],
                opinion: "This is the most important case in Indian history. Without it, we would likely be under an authoritarian regime by now. It shows the power of a brave judiciary."
            },
            'mohori': { 
                title: "Mohori Bibee (1903)", 
                cat: "Contract Act",
                desc: "The rule on Minor's Agreements.",
                longFacts: "<p>A minor cannot enter into a contract. Any agreement made by a minor is 'Void-ab-initio' (null from the start). This case protects children from being exploited in commercial deals.</p>",
                points: ["Minor's agreement is void.", "Mandatory nature of Sec 11.", "No restitution in such cases.", "Protection of children.", "Contractual incapacity.", "Shield for minors.", "Absolute nullity.", "Moneylender's loss.", "Legal maturity required.", "Judicial precedent since 1903."],
                opinion: "It's a necessary law. Though it seems harsh for lenders, it correctly assumes that minors lack the capacity to understand the consequences of their promises."
            },
            'nanavati': { 
                title: "KM Nanavati (1959)", 
                cat: "IPC / BNS",
                desc: "The end of the Jury system in India.",
                longFacts: "<p>The story of a naval officer who killed his wife's lover. It led to the abolition of jury trials in India because the jury was influenced by media and emotions.</p>",
                points: ["Last jury trial.", "Sudden provocation test.", "Intent proven.", "Cooling-off period concept.", "Media influence exposed.", "Murder vs Culpable Homicide.", "Abolition of Jury system.", "Naval officer's trial.", "Sylvia & Prem Ahuja affair.", "Public sympathy vs Law."],
                opinion: "Law should be based on facts, not public emotion. Abolishing the jury was the right move to ensure objective justice."
            },
            'dastane': { 
                title: "Dastane v Dastane (1975)", 
                cat: "HMA / Family Law",
                desc: "Defining Mental Cruelty in marriage.",
                longFacts: "<p>This case expanded the definition of cruelty. It established that physical violence is not necessary; mental torture is also a valid ground for divorce.</p>",
                points: ["Mental cruelty recognized.", "Sec 13(1)(ia) base.", "Subjective test.", "Conduct of spouse.", "Standard of proof.", "Marital breakdown.", "Relief for victims.", "Case study of behavior.", "Psychological impact.", "Modern divorce standard."],
                opinion: "Cruelty is not just a slap; it's the constant degradation of the soul. This case finally gave a voice to those suffering in toxic marriages."
            },
            'hadley': { 
                title: "Hadley v Baxendale (1854)", 
                cat: "Contract Act",
                desc: "Remoteness of Damages rule.",
                longFacts: "<p>This case defines how much compensation one can get if a contract is broken. You only get paid for direct losses, not for 'remote' ones unless warned before.</p>",
                points: ["Section 73 ICA base.", "Reasonable foreseeability.", "Natural consequences.", "Special circumstances rule.", "Direct vs Indirect loss.", "Warning requirement.", "Business liability limit.", "Damage calculation.", "Global precedent.", "Fair compensation."],
                opinion: "Business would be impossible if one mistake could lead to infinite liability. This rule keeps the marketplace fair and predictable."
            }
        };

        const container = document.getElementById('casesContainer');
        Object.keys(caseDatabase).forEach(key => {
            const data = caseDatabase[key];
            container.innerHTML += `
                <div class="case-card bg-white rounded-3xl p-6 shadow-md border border-gray-100 flex flex-col justify-between" data-title="${data.title} ${data.cat}">
                    <div>
                        <span class="text-[8px] font-black text-pink-500 uppercase tracking-widest bg-pink-50 px-3 py-1 rounded-full mb-3 inline-block">${data.cat}</span>
                        <h2 class="text-xl font-black text-gray-800 leading-tight">${data.title}</h2>
                        <p class="text-gray-400 text-[11px] mt-2 font-medium">${data.desc}</p>
                    </div>
                    <button onclick="openModal('${key}')" class="mt-6 w-full py-3 bg-gray-50 text-gray-800 rounded-xl font-black text-[9px] uppercase tracking-widest active:scale-95 transition-all hover:bg-pink-500 hover:text-white">Analysis</button>
                </div>
            `;
        });

        function openModal(id) {
            const data = caseDatabase[id];
            document.getElementById('modalDescription').innerText = data.desc;
            document.getElementById('modalLongFacts').innerHTML = data.longFacts;
            document.getElementById('modalOpinion').innerText = data.opinion;
            
            const pointsList = document.getElementById('modalPoints');
            pointsList.innerHTML = '';
            data.points.forEach((p, i) => {
                pointsList.innerHTML += `<li class="flex items-start gap-3"><span class="w-5 h-5 bg-pink-100 text-pink-600 rounded flex items-center justify-center text-[10px] shrink-0">${i+1}</span> ${p}</li>`;
            });

            document.getElementById('caseModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function searchCases() {
            let input = document.getElementById('caseSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('case-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                cards[i].classList.toggle('hidden', !title.includes(input));
            }
        }

        window.onpageshow = function(event) { if (event.persisted) location.reload(); };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.onkeydown = function(e) { if (e.ctrlKey && [67, 86, 85, 83, 73, 74].includes(e.keyCode)) return false; };
    </script>

    <footer class="py-16 text-center">
        <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">&copy; 2026 Calcutta Law Journal</p>
    </footer>

</body>
</html>
