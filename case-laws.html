<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Judgments | CLJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfdfe; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .blur-bg { position: fixed; z-index: -1; filter: blur(60px); opacity: 0.25; pointer-events: none; }
        
        .modal-overlay { opacity: 0; visibility: hidden; transition: all 0.3s ease; display: flex; align-items: flex-end; z-index: 1000;}
        @media (min-width: 768px) { .modal-overlay { align-items: center; } }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-container { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-container { transform: translateY(0); }

        .search-focus:focus-within { border-color: #ec4899; box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2); }
        
        .case-card { transition: all 0.3s ease; border-top: 4px solid #ec4899; height: 100%; display: flex; flex-direction: column; }
        .case-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .case-card.hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .points-box { 
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
            border-radius: 2rem;
            border: 1px solid #dbeafe;
        }
        
        .opinion-box { background: #fff1f2; border-left: 4px solid #be185d; padding: 1.5rem; border-radius: 1.5rem; }

        .page-fade-out { opacity: 0 !important; transition: opacity 0.2s; }
    </style>
</head>
<body class="pb-10">

    <div class="blur-bg bg-pink-400 w-64 h-64 -top-10 -left-10"></div>
    <div class="blur-bg bg-blue-400 w-64 h-64 top-1/2 -right-10"></div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-2xl px-4 py-4 md:px-10 md:py-6 flex justify-between items-center border-b border-gray-100">
        <h1 class="font-black text-gray-800 text-xl md:text-2xl tracking-tighter">CLJ <span class="text-pink-500">Cases</span></h1>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-pink-600 bg-pink-50 px-5 py-2.5 rounded-full shadow-sm active:scale-90 transition">Home</a>
    </nav>

    <header class="pt-10 pb-6 px-6 text-center">
        <h1 class="text-4xl md:text-7xl font-serif font-bold text-gray-800 mb-2 tracking-tight leading-tight">Landmark <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">Judgments</span></h1>
        
        <div class="max-w-md mx-auto mt-8 mb-10 relative search-focus transition-all duration-300 border-2 border-white rounded-2xl bg-white/90 backdrop-blur-md flex items-center px-5 shadow-xl">
            <i class="fa-solid fa-magnifying-glass text-pink-500 text-lg"></i>
            <input type="text" id="caseSearch" onkeyup="searchCases()" placeholder="Search from all acts and cases..." class="w-full py-4 px-4 text-base font-bold outline-none bg-transparent text-gray-700 placeholder:text-gray-300">
        </div>
    </header>

    <main class="px-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto" id="casesContainer"></main>

    <div id="caseModal" class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-md justify-center">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-full max-w-2xl h-[92vh] md:h-[85vh] rounded-t-[2.5rem] md:rounded-[3rem] shadow-2xl overflow-hidden relative flex flex-col">
            
            <div class="px-6 py-5 border-b border-gray-50 flex justify-between items-center sticky top-0 bg-white z-10">
                <h3 class="font-black text-gray-800 text-base">In-Depth Analysis</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div class="p-8 overflow-y-auto no-scrollbar space-y-12 pb-24 text-left">
                <div>
                    <h4 class="text-pink-500 font-black text-[10px] uppercase tracking-widest mb-4">Background Facts</h4>
                    <p id="modalDescription" class="text-gray-800 text-2xl leading-tight font-serif italic mb-6"></p>
                    <div id="modalLongFacts" class="text-gray-600 text-base leading-relaxed space-y-6"></div>
                </div>

                <div class="points-box p-8">
                    <h4 class="text-blue-700 font-black text-[10px] uppercase tracking-widest mb-6">10 Key Takeaways</h4>
                    <ul id="modalPoints" class="space-y-4 text-gray-700 text-sm font-semibold"></ul>
                </div>

                <div class="opinion-box">
                    <h4 class="text-pink-700 font-black text-[10px] uppercase tracking-widest mb-3">OPINION</h4>
                    <p id="modalOpinion" class="text-pink-900 text-base italic leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const caseDatabase = {
            'kesavananda': { 
                title: "Kesavananda Bharati (1973)", 
                cat: "Constitution",
                desc: "Basic Structure Doctrine origin.",
                longFacts: "<p>The 13-judge bench of the Supreme Court sat for 68 days to decide the power of Parliament to amend the Constitution. It arose from a property dispute in Kerala but became a shield for Indian democracy.</p><p>It established that while Parliament has wide powers under Article 368, it cannot touch the 'identity' of the Constitution.</p>",
                points: ["Basic Structure Doctrine established.", "Art 368 is not absolute.", "Judicial Review is essential.", "Constitutional supremacy confirmed.", "Preamble is a part of the document.", "Overruled Golaknath case.", "Checks and Balances reaffirmed.", "Secularism as core value.", "Parliament is not sovereign; Constitution is.", "7:6 razor-thin majority judgment."],
                opinion: "This judgment is the only reason India is not a totalitarian state. It shows the spine of the Indian Judiciary during the toughest political times."
            },
            'maneka': { 
                title: "Maneka Gandhi (1978)", 
                cat: "Article 21",
                desc: "Redefining personal liberty.",
                longFacts: "<p>When Maneka Gandhi's passport was impounded without reason, the SC expanded Art 21. It moved from a literal interpretation to a substantive one, demanding that procedures must be 'Fair, Just, and Reasonable'.</p>",
                points: ["Procedure established by law must be reasonable.", "Golden Triangle (Art 14, 19, 21).", "Right to travel abroad included.", "Natural Justice is mandatory.", "Expanded scope of Personal Liberty.", "Protection against arbitrary state action.", "Overruled A.K. Gopalan case logic.", "Due process principles introduced.", "Judiciary becomes proactive.", "Foundational for environmental & privacy laws."],
                opinion: "This case made the Indian Constitution 'humane'. It stopped the government from hiding behind technicalities to violate human rights."
            },
            'puttaswamy': { 
                title: "K.S. Puttaswamy (2017)", 
                cat: "Privacy",
                desc: "Data is part of Dignity.",
                longFacts: "<p>A 9-judge bench decided whether privacy is a fundamental right. It arose during the Aadhaar challenge. The court held that privacy is intrinsic to life and dignity under Art 21.</p>",
                points: ["Privacy is a Fundamental Right.", "Informational privacy recognized.", "Triple Test for state interference.", "Bodily autonomy protected.", "Overruled ADM Jabalpur (Habeas Corpus).", "Dignity is a core value.", "Sexual orientation privacy included.", "Check on digital surveillance.", "Unanimous 9-judge decision.", "Future of data protection law."],
                opinion: "In a world of surveillance, this is every citizen's digital armor. It ensures the state doesn't own your personal information."
            },
            'mohori': { 
                title: "Mohori Bibee (1903)", 
                cat: "Contract Act",
                desc: "The Minor's Agreement rule.",
                longFacts: "<p>A minor borrowed money and executed a mortgage. The Privy Council ruled that under Section 11 of the Contract Act, a minor's agreement is void from the start (void-ab-initio).</p>",
                points: ["Minor's agreement is void-ab-initio.", "No liability for breach.", "Protection of young borrowers.", "Sec 11 ICA interpretation.", "Shield for minors.", "Absolute nullity.", "No restitution in void contracts.", "Lender's risk confirmed.", "Foundation of incapacity law.", "120-year-old active precedent."],
                opinion: "Crucial for protecting kids from predatory business. The law assumes minors can't foresee long-term financial traps."
            },
            'nanavati': { 
                title: "KM Nanavati (1959)", 
                cat: "IPC / BNS",
                desc: "End of the Jury trials.",
                longFacts: "<p>A high-profile case where a naval officer killed his wife's lover. It captured the public's imagination and led to the abolition of the jury system in India due to biased verdicts.</p>",
                points: ["Jury system abolished.", "Sudden Provocation test defined.", "Difference in Murder vs Culpable Homicide.", "Impact of media on trials.", "Cooling-off period concept.", "Mens Rea assessment.", "Defense of Honor rejected.", "Public emotion vs Legal fact.", "Last major jury trial.", "Influenced Sec 300 IPC (103 BNS)."],
                opinion: "Justice should be blind, but juries have eyes for drama. Professional judges were a necessary upgrade for Indian justice."
            },
            'dastane': { 
                title: "Dastane v Dastane (1975)", 
                cat: "HMA / Family Law",
                desc: "Defining Mental Cruelty.",
                longFacts: "<p>The husband sought divorce on grounds of cruelty. The SC ruled that cruelty isn't just physical; persistent mental agony and behavioral torture are valid grounds for divorce.</p>",
                points: ["Mental Cruelty recognized.", "Expanded Sec 13 HMA.", "Subjective impact on spouse.", "Preponderance of probabilities standard.", "Marital relief expanded.", "Behavioral analysis by court.", "Psychological safety in marriage.", "Modern divorce benchmark.", "Relief for toxic environment victims.", "Foundation for modern family law."],
                opinion: "This case saved thousands from 'silent prisons'. Mental torture can be more damaging than physical bruises."
            },
            'hadley': { 
                title: "Hadley v Baxendale (1854)", 
                cat: "Contract Act",
                desc: "The rule on Damages.",
                longFacts: "<p>A classic case on breach of contract. It set the rule that damages should only cover losses that arise naturally from the breach or were foreseeable by both parties.</p>",
                points: ["Foundation of Sec 73 ICA.", "Direct vs Remote loss.", "Reasonable foreseeability test.", "Special damages communication.", "Mitigation of loss concept.", "Fair compensation logic.", "Commercial predictability.", "Limit on business liability.", "Global contract standard.", "Damages as compensation, not punishment."],
                opinion: "This keeps the economy running. You shouldn't be ruined by a mistake unless you were warned of the extreme risks beforehand."
            },
            'vishaka': { 
                title: "Vishaka v Rajasthan (1997)", 
                cat: "Workplace Safety",
                desc: "Guidelines against harassment.",
                longFacts: "<p>Bhanwari Devi's assault led to this. Since there was no law on workplace harassment, the SC created the 'Vishaka Guidelines' to protect women until the 2013 Act.</p>",
                points: ["Judicial legislation.", "POSH Act 2013 precursor.", "Employer liability defined.", "Internal Committee requirement.", "Art 14 & 21 protection.", "Gender equality focus.", "Zero tolerance policy.", "Mandatory grievance mechanism.", "International convention usage.", "Justice for Bhanwari Devi."],
                opinion: "A perfect example of the Court stepping in when the Legislature fails to act. It changed professional India for women."
            },
            'shayara': { 
                title: "Shayara Bano (2017)", 
                cat: "Gender Justice",
                desc: "Triple Talaq unconstitutional.",
                longFacts: "<p>Triple Talaq was challenged as being arbitrary and discriminatory. The SC declared it unconstitutional as it violated the dignity of Muslim women and Article 14.</p>",
                points: ["Triple Talaq struck down.", "Art 14 violation.", "Manifestly arbitrary test.", "Personal law vs Constitution.", "Dignity of women prioritized.", "Reform in family law.", "Essential religious practice test.", "Paved way for legislation.", "Protection against instant divorce.", "Social reform milestone."],
                opinion: "Equality should never stop at the door of religion. This was a massive win for constitutional morality."
            },
            'adm_jabalpur': { 
                title: "ADM Jabalpur (1976)", 
                cat: "Emergency",
                desc: "The Judiciary's dark day.",
                longFacts: "<p>During Emergency, the SC said citizens could be arrested without reason. Only Justice Khanna dissented. This 'black mark' was finally corrected in 2017.</p>",
                points: ["Habeas Corpus suspension case.", "Right to life denied (then).", "Justice Khanna's brave dissent.", "Judicial failure lesson.", "Overruled by Privacy case.", "Checks and balances failure.", "44th Amendment trigger.", "Totalitarianism warning.", "Correction of historic wrong.", "Dignity is inalienable."],
                opinion: "A reminder that even the Supreme Court can be wrong. Justice Khanna is a hero for choosing his conscience over his career."
            }
        };

        const container = document.getElementById('casesContainer');
        Object.keys(caseDatabase).forEach(key => {
            const data = caseDatabase[key];
            container.innerHTML += `
                <div class="case-card bg-white rounded-3xl p-6 shadow-md border border-gray-100" data-title="${data.title} ${data.cat}">
                    <div class="flex-grow">
                        <span class="text-[8px] font-black text-pink-500 uppercase tracking-widest bg-pink-50 px-3 py-1 rounded-full mb-3 inline-block">${data.cat}</span>
                        <h2 class="text-xl font-black text-gray-800 leading-tight">${data.title}</h2>
                        <p class="text-gray-400 text-[11px] mt-2 font-medium line-clamp-2">${data.desc}</p>
                    </div>
                    <button onclick="openModal('${key}')" class="mt-6 w-full py-3 bg-gray-50 text-gray-800 rounded-xl font-black text-[9px] uppercase tracking-widest active:scale-95 transition-all hover:bg-pink-500 hover:text-white">Analysis</button>
                </div>
            `;
        });

        function openModal(id) {
            const data = caseDatabase[id];
            document.getElementById('modalDescription').innerText = data.desc;
            document.getElementById('modalLongFacts').innerHTML = data.longFacts;
            document.getElementById('modalOpinion').innerText = data.opinion;
            
            const pointsList = document.getElementById('modalPoints');
            pointsList.innerHTML = '';
            data.points.forEach((p, index) => {
                pointsList.innerHTML += `<li class="flex items-start gap-3"><span class="w-5 h-5 bg-blue-100 text-blue-600 rounded flex items-center justify-center text-[10px] shrink-0 font-bold">${index+1}</span> ${p}</li>`;
            });

            document.getElementById('caseModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function searchCases() {
            let input = document.getElementById('caseSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('case-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                if (title.includes(input)) {
                    cards[i].classList.remove('hidden');
                } else {
                    cards[i].classList.add('hidden');
                }
            }
        }

        window.onpageshow = function(event) { if (event.persisted) location.reload(); };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.onkeydown = function(e) { if (e.ctrlKey && [67, 86, 85, 83, 73, 74].includes(e.keyCode)) return false; };
    </script>

    <footer class="py-16 text-center">
        <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">&copy; 2026 Calcutta Law Journal</p>
    </footer>

</body>
</html>
