<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Judgments | CLJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfdfe; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .blur-bg { position: fixed; z-index: -1; filter: blur(60px); opacity: 0.25; pointer-events: none; }
        
        .modal-overlay { opacity: 0; visibility: hidden; transition: all 0.3s ease; display: flex; align-items: flex-end; z-index: 1000;}
        @media (min-width: 768px) { .modal-overlay { align-items: center; } }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-container { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-container { transform: translateY(0); }

        .search-focus:focus-within { border-color: #ec4899; box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2); }
        
        .case-card { transition: all 0.3s ease; border-top: 4px solid #ec4899; }
        .case-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .case-card.hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .opinion-box { background: #fff1f2; border-left: 4px solid #be185d; padding: 1.5rem; border-radius: 1.5rem; }
    </style>
</head>
<body class="pb-10">

    <div class="blur-bg bg-pink-400 w-64 h-64 -top-10 -left-10"></div>
    <div class="blur-bg bg-blue-400 w-64 h-64 top-1/2 -right-10"></div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-2xl px-4 py-4 md:px-10 md:py-6 flex justify-between items-center border-b border-gray-100">
        <h1 class="font-black text-gray-800 text-xl md:text-2xl tracking-tighter">CLJ <span class="text-pink-500">Cases</span></h1>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-pink-600 bg-pink-50 px-5 py-2.5 rounded-full shadow-sm active:scale-90 transition">Home</a>
    </nav>

    <header class="pt-10 pb-6 px-6 text-center">
        <h1 class="text-4xl md:text-7xl font-serif font-bold text-gray-800 mb-2 tracking-tight leading-tight">Landmark <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">Judgments</span></h1>
        
        <div class="max-w-md mx-auto mt-8 mb-10 relative search-focus transition-all duration-300 border-2 border-white rounded-2xl bg-white/90 backdrop-blur-md flex items-center px-5 shadow-xl">
            <i class="fa-solid fa-magnifying-glass text-pink-500 text-lg"></i>
            <input type="text" id="caseSearch" onkeyup="searchCases()" placeholder="Search from 15+ cases..." class="w-full py-4 px-4 text-base font-bold outline-none bg-transparent text-gray-700 placeholder:text-gray-300">
        </div>
    </header>

    <main class="px-5 grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto" id="casesContainer"></main>

    <div id="caseModal" class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-md justify-center">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-full max-w-2xl h-[92vh] md:h-[85vh] rounded-t-[2.5rem] md:rounded-[3rem] shadow-2xl overflow-hidden relative flex flex-col">
            
            <div class="px-6 py-5 border-b border-gray-50 flex justify-between items-center sticky top-0 bg-white z-10">
                <h3 class="font-black text-gray-800 text-base">In-Depth Analysis</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div class="p-8 overflow-y-auto no-scrollbar space-y-12 pb-24 text-left">
                <div>
                    <h4 class="text-pink-500 font-black text-[10px] uppercase tracking-widest mb-4">Background Facts</h4>
                    <p id="modalDescription" class="text-gray-800 text-3xl leading-tight font-serif italic mb-6"></p>
                    <div id="modalLongFacts" class="text-gray-600 text-base leading-relaxed space-y-6"></div>
                </div>

                <div class="bg-gray-50 p-8 rounded-[2rem]">
                    <h4 class="text-gray-800 font-black text-[10px] uppercase tracking-widest mb-6">10 Key Points</h4>
                    <ul id="modalPoints" class="space-y-4 text-gray-700 text-sm font-semibold"></ul>
                </div>

                <div class="opinion-box">
                    <h4 class="text-pink-700 font-black text-[10px] uppercase tracking-widest mb-3">Rey's Opinion</h4>
                    <p id="modalOpinion" class="text-pink-900 text-base italic leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const caseDatabase = {
            'kesavananda': { 
                title: "Kesavananda Bharati (1973)", 
                cat: "Constitution",
                desc: "The battle for the soul of the Constitution.",
                longFacts: "<p>The landmark 13-judge bench decision that saved Indian democracy. It limited the power of Parliament to amend the Constitution by introducing the 'Basic Structure Doctrine'.</p><p>This case ensures that the core identity of India (Secularism, Democracy, Federalism) remains unchangeable even by a 2/3rd majority in Parliament. It was a 7:6 majority decision.</p>",
                points: ["Basic Structure Doctrine born.", "Art 368 is not absolute.", "Judicial Review is unchangeable.", "Overruled Golaknath judgment.", "Constitutional Supremacy re-affirmed.", "Separation of Powers protected.", "Preamble is a part of the document.", "Ensured India remains a Democracy.", "Nani Palkhivala's legendary arguments.", "Foundation for future rights."],
                opinion: "This is the 'shield' of our nation. Without it, the Constitution would have been a toy for politicians. It proves that the Judiciary is the final guardian of our liberty."
            },
            'maneka': { 
                title: "Maneka Gandhi (1978)", 
                cat: "Article 21",
                desc: "Procedure must be Just, Fair and Reasonable.",
                longFacts: "<p>Maneka Gandhi's passport was seized without reason. She challenged it, leading to a new interpretation of Article 21. It established that 'Procedure established by law' is not enough; the procedure must be fair.</p>",
                points: ["Expanded scope of Art 21.", "Golden Triangle (Art 14, 19, 21).", "Natural Justice mandatory.", "Right to travel abroad protected.", "Law must be 'Reasonable'.", "Overruled A.K. Gopalan logic.", "Due process principles adopted.", "Protects against state arbitrariness.", "Liberty is not a static concept.", "Birth of substantive due process in India."],
                opinion: "This case ended the era where the government could just say 'because it's the law'. It forced the state to be logical and humane."
            },
            'puttaswamy': { 
                title: "K.S. Puttaswamy (2017)", 
                cat: "Privacy",
                desc: "Right to Privacy is a Fundamental Right.",
                longFacts: "<p>A 9-judge bench unanimously declared that Privacy is an inherent part of Right to Life under Article 21. This changed how biometrics, data, and personal choices are handled in India.</p>",
                points: ["Privacy is a Fundamental Right.", "Unanimous 9-judge decision.", "Covers informational privacy.", "Covers bodily autonomy.", "Overruled ADM Jabalpur mistake.", "Triple Test for state interference.", "Dignity is part of Art 21.", "Safeguard against surveillance.", "Universal human rights focus.", "Future of digital India base."],
                opinion: "In the digital age, your data is your identity. This judgment ensures that the government cannot own your personal life under the guise of welfare."
            },
            'vishaka': { 
                title: "Vishaka v. Rajasthan (1997)", 
                cat: "Workplace Safety",
                desc: "Origin of Sexual Harassment Laws.",
                longFacts: "<p>When Bhanwari Devi was assaulted and no law existed for workplace harassment, the SC used international treaties to create 'Vishaka Guidelines'. This served as law for 16 years until the POSH Act 2013.</p>",
                points: ["Guidelines created in legal vacuum.", "Art 14, 15, 19, 21 protected.", "Employer's responsibility defined.", "Internal Committee requirement.", "Gender equality focus.", "International conventions used.", "Zero tolerance for harassment.", "Power of Judicial Legislation.", "Pre-cursor to POSH Act.", "Justice for Bhanwari Devi."],
                opinion: "This case shows that when the Parliament sleeps, the Supreme Court wakes up. It made professional spaces safer for millions of women."
            },
            'navtej': { 
                title: "Navtej Singh Johar (2018)", 
                cat: "LGBTQ+ Rights",
                desc: "Decriminalization of Consensual Acts.",
                longFacts: "<p>The SC struck down Section 377 of IPC as far as it criminalized consensual adult acts. It recognized that sexual orientation is biological and a part of privacy and dignity.</p>",
                points: ["Sec 377 struck down.", "Right to love recognized.", "Constitutional Morality vs Social Morality.", "Sexual orientation is innate.", "Privacy protected under Art 21.", "Equality under Art 14.", "State owes an apology.", "Identity is not a crime.", "Abolition of Victorian morality.", "Victory for human dignity."],
                opinion: "Social morality changes with time, but Constitutional morality is permanent. This case finally treated a marginalized community as equal citizens."
            },
            'mohori': { 
                title: "Mohori Bibee (1903)", 
                cat: "Contract Act",
                desc: "Minor's Agreement is Void-ab-initio.",
                longFacts: "<p>A landmark from 1903. A minor borrowed money and then sued to cancel the deal. The court held that agreements with minors have no legal value from the very start.</p>",
                points: ["Void-ab-initio principle.", "Section 11 ICA focus.", "Minor has no capacity.", "No recovery of money for lender.", "Protection of children from debt.", "Shield for the minor.", "Doctrine of Estoppel doesn't apply.", "Absolute nullity.", "Judicial precedent since British era.", "Commercial safety for youth."],
                opinion: "It's a protective shield. Kids don't understand the gravity of debt, so the law simply refuses to recognize the deal. Simple and effective."
            },
            'nanavati': { 
                title: "KM Nanavati (1959)", 
                cat: "IPC / BNS",
                desc: "The case that ended Jury trials.",
                longFacts: "<p>Commander Nanavati discovered his wife's affair and killed the lover. The jury was biased by media, leading to the end of the Jury system in India. It also defined 'Sudden Provocation'.</p>",
                points: ["Abolished Jury system.", "Sudden Provocation test.", "Intent vs Emotion.", "Media influence on trials.", "Difference in Murder types.", "Sec 300 IPC (103 BNS).", "Naval officer's high profile.", "Public sympathy vs Law.", "Cooling-off period concept.", "Legal objectivity restored."],
                opinion: "Juries can be manipulated by emotions. For true justice, we need trained legal minds who look at evidence, not headlines."
            },
            'dastane': { 
                title: "Dastane v Dastane (1975)", 
                cat: "HMA / Family Law",
                desc: "Cruelty includes Mental Torture.",
                longFacts: "<p>In this HMA case, the SC ruled that physical violence isn't required for divorce. Constant mental agony and behavioral torture also count as cruelty under Section 13.</p>",
                points: ["Mental Cruelty defined.", "Sec 13 HMA expanded.", "Subjective impact test.", "Conduct of spouse analyzed.", "Burden of proof standard.", "Relief for mental suffering.", "Psychological health focus.", "Modern marital standards.", "Condonation discussion.", "Precedent for all family cases."],
                opinion: "Marriage should be about peace. If living together becomes a mental hell, the law shouldn't force you to stay just because there are no physical bruises."
            },
            'hadley': { 
                title: "Hadley v Baxendale (1854)", 
                cat: "Contract Act",
                desc: "The rule of Direct vs Remote loss.",
                longFacts: "<p>When a mill shaft was delayed, the mill owner sued for loss of profits. The court said you only get damages for losses that were foreseeable or warned about.</p>",
                points: ["Foundation of Sec 73 ICA.", "Reasonable foreseeability.", "Direct vs Remote damage.", "Warning requirement.", "Damage limit rule.", "Commercial liability cap.", "Natural consequences of breach.", "Standard for business deals.", "Global contract rule.", "Fair compensation logic."],
                opinion: "You can't blame someone for your business failing unless you told them how important the task was. This rule keeps business risks predictable."
            },
            'shayara': { 
                title: "Shayara Bano (2017)", 
                cat: "Gender Justice",
                desc: "Triple Talaq declared Unconstitutional.",
                longFacts: "<p>The SC struck down 'Instant Triple Talaq' (Talaq-e-Biddat) as it was arbitrary and violated the equality and dignity of Muslim women. It wasn't an essential religious practice.</p>",
                points: ["Triple Talaq struck down.", "Arbitrary nature exposed.", "Art 14 violation.", "Dignity of women.", "Essential practice test.", "Gender equality milestone.", "Personal law vs Constitution.", "Paved way for legislation.", "Protection for wives.", "Victory for reform."],
                opinion: "Religion cannot be used as an excuse to treat women as disposable. This was a long-overdue correction in personal laws."
            },
            'minerva': { 
                title: "Minerva Mills (1980)", 
                cat: "Constitution",
                desc: "Balance between Fundamental Rights & DPSP.",
                longFacts: "<p>The government tried to make Parliament's power unlimited. The SC ruled that 'Limited Amending Power' is itself a basic structure. It restored the balance between individual rights and state policy.</p>",
                points: ["Harmony of Rights and DPSP.", "Limited amending power.", "Parliament is not master.", "Basic structure strengthened.", "Judicial review protected.", "Struck down 42nd Amendment parts.", "Checks and balances.", "Supremacy of Constitution.", "Prevented dictatorial power.", "Preserved democratic balance."],
                opinion: "Power corrupts, and absolute power corrupts absolutely. Minerva Mills ensured that the Parliament stays within its lane."
            },
            'sr_bommai': { 
                title: "S.R. Bommai (1994)", 
                cat: "Federalism",
                desc: "Check on misuse of President's Rule.",
                longFacts: "<p>Governments were being dismissed arbitrarily under Art 356. The SC held that a majority must be proved on the 'floor of the house', not in a Governor's letter.</p>",
                points: ["Floor test mandatory.", "Art 356 subject to review.", "Federalism is Basic Structure.", "Secularism is Basic Structure.", "Governor's role defined.", "Check on Central power.", "Democratic stability.", "Protection of State govts.", "Political accountability.", "Federal equilibrium."],
                opinion: "States are not just branches of the Central government. This case protected the diversity of Indian politics."
            },
            'shah_bano': { 
                title: "Shah Bano (1985)", 
                cat: "Personal Law",
                desc: "Maintenance is a human right.",
                longFacts: "<p>A 62-year-old woman was denied maintenance after divorce. The SC ruled that Section 125 of CrPC is secular and applies to everyone, regardless of their religion.</p>",
                points: ["Secular maintenance law.", "Sec 125 CrPC focus.", "Right to survive.", "Human rights over rituals.", "Gender justice focus.", "UCC discussion started.", "Protection for elderly women.", "Personal law limits.", "Equality before law.", "Social security milestone."],
                opinion: "No religion teaches that a divorced wife should starve. The court chose human life over religious technicality."
            },
            'adm_jabalpur': { 
                title: "ADM Jabalpur (1976)", 
                cat: "Emergency",
                desc: "The SC's darkest hour (and its correction).",
                longFacts: "<p>During Emergency, the SC said citizens lose even the Right to Life. Only Justice Khanna dissented. This was later overruled in the Privacy judgment, calling it 'vitiated'.</p>",
                points: ["Habeas Corpus case.", "Right to Life suspended (then).", "Justice Khanna's dissent.", "Overruled in 2017.", "Judicial failure lesson.", "44th Amendment trigger.", "Emergency law review.", "Dignity vs State power.", "Historic mistake acknowledged.", "Future safeguard."],
                opinion: "Justice Khanna sacrificed his career for the truth. This case reminds us that even courts can fail, and they must have the courage to fix their mistakes."
            },
            'satyabrata': { 
                title: "Satyabrata Ghose (1954)", 
                cat: "Contract Act",
                desc: "Doctrine of Frustration (Sec 56).",
                longFacts: "<p>A case involving land deals during WWII. The court defined when a contract becomes 'Impossible' to perform. If the very base of the deal is gone, the contract is frustrated.</p>",
                points: ["Section 56 ICA base.", "Doctrine of Frustration.", "Physical vs Legal impossibility.", "Impact of War on contracts.", "Grounds for voiding deals.", "Unforeseen events.", "Performance failure.", "Commercial impossibility test.", "Justice Mukherjea's logic.", "Landmark for business law."],
                opinion: "You cannot force someone to do the impossible. This case gives a fair exit to businesses when the world changes overnight."
            }
        };

        const container = document.getElementById('casesContainer');
        Object.keys(caseDatabase).forEach(key => {
            const data = caseDatabase[key];
            container.innerHTML += `
                <div class="case-card bg-white rounded-3xl p-6 shadow-md border border-gray-100 flex flex-col justify-between" data-title="${data.title} ${data.cat}">
                    <div>
                        <span class="text-[8px] font-black text-pink-500 uppercase tracking-widest bg-pink-50 px-3 py-1 rounded-full mb-3 inline-block">${data.cat}</span>
                        <h2 class="text-xl font-black text-gray-800 leading-tight">${data.title}</h2>
                        <p class="text-gray-400 text-[11px] mt-2 font-medium">${data.desc}</p>
                    </div>
                    <button onclick="openModal('${key}')" class="mt-6 w-full py-3 bg-gray-50 text-gray-800 rounded-xl font-black text-[9px] uppercase tracking-widest active:scale-95 transition-all hover:bg-pink-500 hover:text-white">Analysis</button>
                </div>
            `;
        });

        function openModal(id) {
            const data = caseDatabase[id];
            document.getElementById('modalDescription').innerText = data.desc;
            document.getElementById('modalLongFacts').innerHTML = data.longFacts;
            document.getElementById('modalOpinion').innerText = data.opinion;
            
            const pointsList = document.getElementById('modalPoints');
            pointsList.innerHTML = '';
            data.points.forEach((p, i) => {
                pointsList.innerHTML += `<li class="flex items-start gap-3"><span class="w-5 h-5 bg-pink-100 text-pink-600 rounded flex items-center justify-center text-[10px] shrink-0">${i+1}</span> ${p}</li>`;
            });

            document.getElementById('caseModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function searchCases() {
            let input = document.getElementById('caseSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('case-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                cards[i].classList.toggle('hidden', !title.includes(input));
            }
        }

        window.onpageshow = function(event) { if (event.persisted) location.reload(); };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.onkeydown = function(e) { if (e.ctrlKey && [67, 86, 85, 83, 73, 74].includes(e.keyCode)) return false; };
    </script>

    <footer class="py-16 text-center">
        <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">&copy; 2026 Calcutta Law Journal</p>
    </footer>

</body>
</html>
