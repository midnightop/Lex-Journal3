<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Constitution of India | Digital Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        /* Copy Paste Protection & UI Reset */
        * { 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #ffffff; 
            color: #1e293b; 
            overflow-x: hidden; 
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #f1f5f9;
        }

        .law-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .law-card:hover {
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        #search-overlay {
            display: none; position: fixed; inset: 0; background: white; z-index: 2000; 
            padding: 20px; flex-direction: column; animation: fadeIn 0.3s ease;
        }
        #search-overlay.active { display: flex; }

        .suggestion-item {
            padding: 15px;
            border-bottom: 1px solid #f8fafc;
            cursor: pointer;
        }

        /* Protection Message Overlay */
        @media print { body { display: none; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="sticky top-0 z-50 glass-header px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-10 h-10 bg-slate-50 flex items-center justify-center rounded-2xl border border-slate-100 text-slate-900 shadow-sm active:scale-95 transition-all">
                <i class="fa-solid fa-house-chimney text-sm"></i>
            </a>
            <div>
                <h1 class="font-extrabold text-slate-900 text-sm tracking-tight uppercase">Constitution</h1>
                <p class="text-[8px] font-black text-blue-600 tracking-widest uppercase">Lawjournal.online</p>
            </div>
        </div>
        <button onclick="toggleSearch(true)" class="w-10 h-10 rounded-2xl bg-slate-900 flex items-center justify-center text-white shadow-lg active:scale-90 transition-all">
            <i class="fa-solid fa-magnifying-glass text-xs"></i>
        </button>
    </nav>

    <div id="search-overlay">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="toggleSearch(false)" class="text-slate-900 text-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <input type="text" id="search-input" placeholder="Search Articles (1-448), Schedules..." class="flex-1 bg-slate-100 border-none rounded-2xl px-5 py-4 font-bold outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div id="search-results" class="flex-1 overflow-y-auto"></div>
    </div>

    <main class="px-6 py-8">
        <header class="mb-10">
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] block mb-2">The Supreme Law of India</span>
            <h2 style="font-family: 'Playfair Display';" class="text-4xl text-slate-900 leading-tight">National <br><span class="italic text-slate-500 font-medium text-3xl">Compendium</span></h2>
        </header>

        <div class="grid grid-cols-3 gap-3 mb-10">
            <div class="bg-blue-50 p-4 rounded-3xl text-center">
                <p class="text-xs font-bold text-blue-700">448</p>
                <p class="text-[8px] uppercase font-black text-blue-400">Articles</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-3xl text-center">
                <p class="text-xs font-bold text-slate-700">12</p>
                <p class="text-[8px] uppercase font-black text-slate-400">Schedules</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-3xl text-center">
                <p class="text-xs font-bold text-slate-700">105+</p>
                <p class="text-[8px] uppercase font-black text-slate-400">Amendments</p>
            </div>
        </div>

        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="filterContent('Article')" class="px-6 py-2.5 bg-slate-900 text-white rounded-full text-[10px] font-bold uppercase whitespace-nowrap">Articles</button>
            <button onclick="filterContent('Schedule')" class="px-6 py-2.5 bg-white border border-slate-100 text-slate-500 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">Schedules</button>
            <button onclick="filterContent('Amendment')" class="px-6 py-2.5 bg-white border border-slate-100 text-slate-500 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">Amendments</button>
        </div>

        <div id="content-hub" class="space-y-4">
            </div>
    </main>

    <script>
        // Data Structure (Summary for 448 articles, Schedules & Amendments)
        const db = [
            // Articles
            { type: "Article", id: "1", title: "Name and territory of the Union", desc: "India, that is Bharat, shall be a Union of States." },
            { type: "Article", id: "14", title: "Equality before law", desc: "Equal protection of laws within the territory of India." },
            { type: "Article", id: "21", title: "Protection of life and liberty", desc: "No person shall be deprived of life or liberty except by legal procedure." },
            { type: "Article", id: "32", title: "Constitutional Remedies", desc: "Right to move Supreme Court for enforcement of rights (Heart and Soul of Constitution)." },
            { type: "Article", id: "44", title: "Uniform Civil Code", desc: "State shall endeavor to secure a UCC for all citizens." },
            { type: "Article", id: "51A", title: "Fundamental Duties", category: "Part IVA", desc: "Lists 11 duties for citizens of India." },
            { type: "Article", id: "370", title: "Temporary Provisions (J&K)", desc: "Provisions regarding Jammu and Kashmir (Abrogated in 2019)." },
            
            // Schedules
            { type: "Schedule", id: "1", title: "States and UTs", desc: "List of States and Union Territories of India." },
            { type: "Schedule", id: "4", title: "Rajya Sabha Seats", desc: "Allocation of seats in the Council of States." },
            { type: "Schedule", id: "8", title: "Official Languages", desc: "Lists 22 languages recognized by the Constitution." },
            { type: "Schedule", id: "10", title: "Anti-Defection Law", desc: "Provisions as to disqualification on ground of defection." },
            { type: "Schedule", id: "12", title: "Municipalities", desc: "Powers, authority and responsibilities of Municipalities." },

            // Amendments
            { type: "Amendment", id: "1st", title: "1951 Amendment", desc: "Added 9th Schedule and placed restrictions on freedom of speech." },
            { type: "Amendment", id: "42nd", title: "Mini Constitution", desc: "Added words 'Socialist', 'Secular' and 'Integrity' to Preamble." },
            { type: "Amendment", id: "101st", title: "GST Introduction", desc: "Introduced the Goods and Services Tax system in 2016." }
        ];

        // Fill remaining 448 articles dynamically for demo purposes
        // In a real app, you'd list all specific content.
        for(let i=2; i<=448; i++){
            if(!db.find(x => x.id == i && x.type == "Article")){
                db.push({ type: "Article", id: i.toString(), title: `Article ${i}`, desc: "Details of Article " + i + " regarding the constitutional framework." });
            }
        }

        const hub = document.getElementById('content-hub');
        const searchInput = document.getElementById('search-input');
        const resultsBox = document.getElementById('search-results');

        function toggleSearch(show) {
            document.getElementById('search-overlay').classList.toggle('active', show);
            if(show) searchInput.focus();
        }

        function render(data) {
            hub.innerHTML = data.map(item => `
                <div class="law-card p-6">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[9px] font-black px-2 py-1 bg-slate-100 rounded text-slate-500 uppercase">${item.type} ${item.id}</span>
                        <i class="fa-solid fa-bookmark text-slate-200 text-xs"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-900 mb-2">${item.title}</h3>
                    <p class="text-xs text-slate-500 leading-relaxed font-medium">${item.desc}</p>
                </div>
            `).join('');
        }

        function filterContent(type) {
            const filtered = db.filter(item => item.type === type);
            render(filtered);
            // Toggle Button Styles
            event.currentTarget.parentElement.querySelectorAll('button').forEach(btn => {
                btn.className = "px-6 py-2.5 bg-white border border-slate-100 text-slate-500 rounded-full text-[10px] font-bold uppercase whitespace-nowrap";
            });
            event.currentTarget.className = "px-6 py-2.5 bg-slate-900 text-white rounded-full text-[10px] font-bold uppercase whitespace-nowrap";
        }

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if(!val) { resultsBox.innerHTML = ""; return; }
            
            const match = db.filter(item => 
                item.title.toLowerCase().includes(val) || 
                item.id.includes(val)
            ).slice(0, 10);

            resultsBox.innerHTML = match.map(m => `
                <div class="suggestion-item" onclick="showSpecific('${m.id}', '${m.type}')">
                    <p class="text-[10px] font-bold text-blue-600 uppercase">${m.type} ${m.id}</p>
                    <p class="text-sm font-bold text-slate-800">${m.title}</p>
                </div>
            `).join('');
        });

        function showSpecific(id, type) {
            const item = db.find(x => x.id === id && x.type === type);
            render([item]);
            toggleSearch(false);
            searchInput.value = "";
            resultsBox.innerHTML = "";
        }

        // Copy Protection Logic
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 67 || e.keyCode == 85 || e.keyCode == 73))) {
                return false;
            }
        };

        // Initial Load
        window.onload = () => render(db.filter(x => x.type === "Article").slice(0, 15));
    </script>
</body>
</html>
